<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1816">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<title>Claude Code Bridge</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&family=Noto+Sans+SC:wght@300;400&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1a1816;
    --surface: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.12);
    --border-light: rgba(255,255,255,0.20);
    --text: rgba(245,240,235,0.96);
    --text2: rgba(235,228,220,0.72);
    --text3: rgba(255,255,255,0.40);
    --text4: rgba(255,255,255,0.26);
    --accent: #d97757;
    --accent-dim: rgba(217,119,87,0.55);
    --accent-glow: rgba(217,119,87,0.9);
    --accent-bg: rgba(217,119,87,0.10);
    --accent-border: rgba(217,119,87,0.22);
    --red: #e87272;
    --font: 'JetBrains Mono', monospace;
    --font-cn: 'Noto Sans SC', sans-serif;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  body { font-family: var(--font); background: var(--bg); color: var(--text);
         height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
         -webkit-font-smoothing: antialiased; }

  .vignette { position: fixed; inset: 0; pointer-events: none; z-index: 0;
              background: radial-gradient(ellipse at 50% 30%, transparent 40%, rgba(0,0,0,0.45) 100%); }

  /* ---- Sidebar ---- */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 90;
             opacity: 0; pointer-events: none; transition: opacity .25s; }
  .overlay.open { opacity: 1; pointer-events: auto; }

  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 300px; max-width: 85vw;
             background: var(--bg); z-index: 100; transform: translateX(-100%);
             transition: transform .25s ease; display: flex; flex-direction: column;
             border-right: 1px solid var(--border); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border);
                    display: flex; align-items: center; gap: 10px; }
  .sidebar-header h2 { font-family: var(--font-cn); font-size: 16px; font-weight: 400; flex: 1; }
  .new-chat-btn { display: flex; align-items: center; gap: 6px; padding: 8px 14px;
                  background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-border);
                  border-radius: 10px; font-size: 13px; cursor: pointer; font-family: var(--font-cn); }
  .new-chat-btn:active { background: rgba(217,119,87,0.18); }
  .session-list { flex: 1; overflow-y: auto; padding: 8px; }
  .session-item { padding: 10px 12px; border-radius: 10px; cursor: pointer; margin-bottom: 2px; }
  .session-item:active, .session-item.active { background: var(--surface); }
  .session-item .s-title { font-family: var(--font-cn); font-size: 14px; color: var(--text);
                           overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .session-item .s-meta { font-size: 12px; color: var(--text4); margin-top: 2px; }

  /* 分隔线 + 记忆/状态/设置 三入口 + 版本铭牌(会话列表 flex:1 撑开,导航与铭牌沉底) */
  .sidebar-divider { height: 1px; background: var(--border); margin: 4px 12px; flex-shrink: 0; }
  .sidebar-nav { padding: 6px 8px; display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
  .nav-item { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
              padding: 10px 12px; border-radius: 10px; background: none; border: none; cursor: pointer;
              color: var(--text2); font-family: var(--font-cn); font-size: 14px; }
  .nav-item i { font-size: 18px; color: var(--text3); }
  .nav-item:active, .nav-item.active { background: var(--surface); color: var(--text); }
  .nav-item.active i { color: var(--accent); }
  .sidebar-footer { padding: 10px 16px calc(10px + var(--safe-bottom)); flex-shrink: 0;
                    font-family: var(--font); font-size: 11px; color: var(--text4);
                    border-top: 1px solid var(--border); letter-spacing: 0.04em; }

  /* ---- Layout ---- */
  /* app = 侧边栏 + 内容区。移动端侧边栏是抽屉(fixed 覆盖),桌面态 ≥768px 变常驻左栏(见媒体查询) */
  .app { flex: 1; display: flex; overflow: hidden; position: relative; z-index: 1; min-height: 0; }
  .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; position: relative; }
  .main { flex: 1; overflow: hidden; display: none; flex-direction: column; position: relative; z-index: 1; }
  .main.active { display: flex; }

  /* 顶栏高度由内容决定(min-height 仅作单行下限):有签名行 → 两行更高,无签名 → 收缩到单行 */
  .topbar { padding: 16px 20px 0; display: flex; align-items: center; justify-content: space-between; min-height: 44px; }
  .topbar-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
  /* 名字/状态一行,签名行(最新记忆)叠在其下;无签名时该行不渲染,顶栏自然收缩 */
  .topbar-idc { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .topbar-idline { display: flex; align-items: center; gap: 8px; min-height: 28px; }
  .topbar-signature { font-size: 12px; color: var(--text3); font-family: var(--font-cn);
                      max-width: 72vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .topbar-signature[hidden] { display: none; }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; background: var(--text4); }
  .status-dot.on { background: var(--accent); box-shadow: 0 0 7px var(--accent-glow); }
  .status-dot.off { background: var(--red); box-shadow: 0 0 7px rgba(232,114,114,0.5); }
  .topbar-label { font-size: 12px; color: var(--accent-dim); letter-spacing: 0.12em; }
  .topbar-right { display: flex; gap: 14px; align-items: center; }
  .topbar-icon { color: rgba(255,255,255,0.22); font-size: 19px; cursor: pointer; background: none; border: none; padding: 4px; }
  .topbar-icon:active { color: rgba(255,255,255,0.5); }
  .divider-top { margin: 14px 20px 0; height: 1px; background: rgba(255,255,255,0.08); }
  /* 模型选择器:放在输入区(对齐生产服位置),按钮 + 上弹 popup */
  .input-meta { position: relative; padding: 2px 4px 6px; display: flex; gap: 2px; }
  .model-slot { position: relative; }
  .model-btn { background: transparent; border: none; outline: none; cursor: pointer;
               font-size: 11px; color: var(--text3); font-family: var(--font);
               padding: 6px 8px; min-height: 32px; max-width: 60vw; overflow: hidden;
               text-overflow: ellipsis; white-space: nowrap; }
  .model-btn:active { color: var(--text2); }
  .model-popup { position: absolute; bottom: calc(100% + 4px); left: 0;
                 background: var(--bg); border: 1px solid var(--border-light);
                 border-radius: 10px; padding: 4px 0; min-width: 160px; z-index: 50;
                 box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
  .model-option { font-size: 14px; font-family: var(--font-cn); color: var(--text2);
                  padding: 0 16px; min-height: 44px; display: flex; align-items: center; cursor: pointer; }
  .model-option:active { background: var(--surface); }
  .model-option.selected { color: var(--accent); }
  .model-option.model-custom { border-top: 1px solid var(--border); color: var(--text3); }

  /* ---- Greeting ---- */
  .greeting-area { flex: 1; display: flex; flex-direction: column; align-items: center;
                   justify-content: center; padding: 32px 24px; }
  .avatar-ring { width: 68px; height: 68px; border-radius: 50%; border: 1px solid var(--accent-border);
                 display: flex; align-items: center; justify-content: center; margin-bottom: 22px; position: relative; }
  .avatar-ring::after { content: ''; position: absolute; inset: -10px; border-radius: 50%; border: 1px solid rgba(217,119,87,0.08); }
  .avatar-inner { width: 50px; height: 50px; border-radius: 50%; background: var(--accent-bg);
                  border: 1px solid var(--accent-border); display: flex; align-items: center;
                  justify-content: center; font-size: 20px; color: var(--accent); }
  .greeting-name { font-family: var(--font-cn); font-size: 24px; font-weight: 300; margin-bottom: 7px; letter-spacing: 0.08em; }
  .greeting-meta { font-family: var(--font-cn); font-size: 12px; color: var(--text3); }

  /* ---- Messages ---- */
  .messages { flex: 1; overflow-y: auto; padding: 20px 16px 8px; display: none;
              flex-direction: column; gap: 18px; -webkit-overflow-scrolling: touch; }
  .messages::-webkit-scrollbar { width: 0; }
  .msg-row { display: flex; flex-direction: column; gap: 4px; }
  .msg-row.user { align-items: flex-end; }
  .msg-row.assistant { align-items: flex-start; }
  .msg-bubble { max-width: 85%; font-size: 15px; line-height: 1.7;
                white-space: pre-wrap; word-break: break-word; }
  .msg-bubble.user { background: var(--accent-bg); border: 1px solid var(--accent-border);
                     border-radius: 12px 12px 3px 12px; padding: 10px 14px;
                     font-family: var(--font-cn); color: var(--text); }
  .msg-bubble.assistant { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
                          border-radius: 12px 12px 12px 3px; padding: 10px 14px;
                          font-family: var(--font-cn); font-weight: 300; color: var(--text2); }
  /* 重发按钮:对齐生产服 IM 逻辑——绝对定位在气泡左侧,悬停/点触时显现。
     隐藏态 pointer-events:none,避免手机上误触不可见按钮(对齐完成标准第 8 条)。 */
  .msg-user-wrap { position: relative; display: inline-block; max-width: 85%; }
  .msg-user-wrap .msg-bubble.user { max-width: 100%; }
  .retry-btn { position: absolute; left: -46px; top: 50%; transform: translateY(-50%);
               background: none; border: none; cursor: pointer; color: var(--text4);
               font-size: 15px; line-height: 1; min-width: 44px; min-height: 44px;
               display: flex; align-items: center; justify-content: center;
               opacity: 0; pointer-events: none; transition: opacity 0.15s; }
  .msg-row.user:hover .retry-btn, .msg-row.user:active .retry-btn { opacity: 1; pointer-events: auto; }
  .retry-btn:active { color: var(--accent); }

  .time-divider { align-self: center; font-size: 11px; color: var(--text4);
                  font-family: var(--font-cn); padding: 4px 0; }
  .history-notice { align-self: center; font-size: 12px; color: var(--text4); font-family: var(--font-cn); }

  .chip-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-family: var(--font-cn);
          color: var(--text3); background: var(--surface); border: 1px solid var(--border);
          border-radius: 8px; padding: 4px 9px; cursor: pointer; }
  .chip.tool { color: var(--accent-dim); }
  .usage-bar { align-self: flex-start; font-size: 11px; color: var(--text4); font-family: var(--font);
               display: flex; gap: 8px; padding: 0 4px; }

  /* 助手回复工具条:复制 / 朗读。触达区 ≥44px 防手机误触 */
  .msg-toolbar { align-self: flex-start; display: flex; gap: 2px; margin-top: 2px; }
  .msg-tool-btn { background: none; border: none; color: var(--text4); cursor: pointer;
                  min-width: 44px; min-height: 44px; padding: 10px; border-radius: 8px;
                  display: flex; align-items: center; justify-content: center; font-size: 17px; }
  .msg-tool-btn:active { color: var(--accent); background: var(--surface); }
  .msg-tool-btn.speaking { color: var(--accent); }
  .typing { align-self: flex-start; color: var(--text4); font-size: 13px; font-family: var(--font-cn); padding: 0 6px; }

  /* ---- Input ---- */
  .input-area { padding: 10px 14px 12px; }
  .input-bar { display: flex; align-items: flex-end; gap: 8px; background: var(--surface);
               border: 1px solid var(--border); border-radius: 16px; padding: 6px 6px 6px 14px; }
  #input { flex: 1; background: none; border: none; outline: none; resize: none; color: var(--text);
           font-family: var(--font-cn); font-size: 15px; line-height: 1.5; max-height: 120px; padding: 6px 0; }
  .send-btn { width: 36px; height: 36px; flex-shrink: 0; border-radius: 50%; border: none; cursor: pointer;
              background: var(--accent); color: #1a1816; font-size: 18px; display: flex;
              align-items: center; justify-content: center; }
  .send-btn:disabled { background: var(--surface); color: var(--text4); }

  /* ---- Thinking sheet ---- */
  .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 110;
                   opacity: 0; pointer-events: none; transition: opacity .2s; }
  .sheet-overlay.open { opacity: 1; pointer-events: auto; }
  .sheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 120; background: var(--bg);
           border-top: 1px solid var(--border); border-radius: 18px 18px 0 0; max-height: 70vh;
           transform: translateY(100%); transition: transform .25s ease; display: flex; flex-direction: column; }
  .sheet.open { transform: translateY(0); }
  .sheet-header { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
                  font-family: var(--font-cn); border-bottom: 1px solid var(--border); }
  .sheet-close { background: none; border: none; color: var(--text3); font-size: 20px; cursor: pointer; }
  .sheet-body { padding: 16px 20px calc(20px + var(--safe-bottom)); overflow-y: auto;
                white-space: pre-wrap; font-size: 13px; line-height: 1.7; color: var(--text2); }

  /* ---- 子页面(记忆 / 状态 / 设置)---- */
  /* 全屏推入 + 左上 ← 返回聊天。移动端从右侧滑入,桌面常驻侧边栏时即时切换 */
  .view { flex: 1; overflow-y: auto; display: none; flex-direction: column;
          padding: 0 0 18px; position: relative; z-index: 1; -webkit-overflow-scrolling: touch; }
  .view.active { display: flex; animation: pushin .22s ease; }
  .view::-webkit-scrollbar { width: 0; }
  @keyframes pushin { from { transform: translateX(24px); opacity: 0; } to { transform: none; opacity: 1; } }
  @media (prefers-reduced-motion: reduce) { .view.active { animation: none; } }
  .view-header { display: flex; align-items: center; gap: 6px; padding: 14px 16px 10px;
                 position: sticky; top: 0; background: var(--bg); z-index: 2; }
  .back-btn { background: none; border: none; color: var(--text2); cursor: pointer;
              min-width: 40px; min-height: 40px; display: flex; align-items: center;
              justify-content: center; font-size: 20px; padding: 0; margin-left: -8px; }
  .back-btn:active { color: var(--accent); }
  .view-body { padding: 0 16px; }
  .view-title { font-family: var(--font-cn); font-size: 20px; font-weight: 300; letter-spacing: 0.08em; }

  /* ---- 桌面态 ≥768px:侧边栏常驻左栏,取消抽屉/遮罩/汉堡键 ---- */
  @media (min-width: 768px) {
    .overlay { display: none !important; }
    .sidebar { position: relative; transform: none !important; width: 280px; max-width: none;
               z-index: 1; flex-shrink: 0; }
    #history-btn { display: none; }
    .back-btn { display: none; }
    .view { max-width: 760px; width: 100%; margin: 0 auto; }
  }

  .mem-stat { display: flex; gap: 24px; padding: 14px 16px; background: var(--surface);
              border: 1px solid var(--border); border-radius: 12px; margin-bottom: 14px; }
  .mem-stat .num { font-size: 22px; color: var(--accent); font-family: var(--font); }
  .mem-stat .lbl { font-size: 11px; color: var(--text3); font-family: var(--font-cn); margin-top: 2px; }
  .mem-search input { width: 100%; background: var(--surface); border: 1px solid var(--border);
                      border-radius: 10px; color: var(--text); font-family: var(--font-cn);
                      font-size: 14px; padding: 10px 13px; outline: none; margin-bottom: 12px; }
  .mem-search input:focus { border-color: var(--accent-border); }
  .mem-item { padding: 11px 13px; background: var(--surface); border: 1px solid var(--border);
              border-radius: 11px; margin-bottom: 8px; display: flex; gap: 10px; align-items: flex-start; }
  .mem-item .body { flex: 1; font-family: var(--font-cn); font-size: 14px; line-height: 1.6;
                    color: var(--text2); word-break: break-word; white-space: pre-wrap; }
  .mem-item .del { background: none; border: none; color: var(--text4); cursor: pointer;
                   font-size: 16px; flex-shrink: 0; padding: 2px 4px; }
  .mem-item .del:active { color: var(--red); }
  .mem-empty { text-align: center; color: var(--text4); font-family: var(--font-cn);
               font-size: 14px; padding: 44px 24px; line-height: 1.9; }
  .mem-empty .sub { font-size: 12px; color: var(--text4); opacity: 0.8; }

  .set-group { margin-bottom: 22px; }
  .set-label { font-family: var(--font-cn); font-size: 12px; color: var(--text3);
               margin-bottom: 8px; letter-spacing: 0.04em; }
  .set-input { width: 100%; background: var(--surface); border: 1px solid var(--border);
               border-radius: 10px; color: var(--text); font-family: var(--font-cn);
               font-size: 15px; padding: 10px 13px; outline: none; }
  .set-input:focus { border-color: var(--accent-border); }
  .set-row { display: flex; justify-content: space-between; gap: 12px; padding: 9px 2px;
             border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 13px; }
  .set-row .k { color: var(--text3); font-family: var(--font-cn); flex-shrink: 0; }
  .set-row .v { color: var(--text2); font-family: var(--font); text-align: right; word-break: break-all; }
  .usage-model { padding: 9px 2px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .usage-model .m { font-family: var(--font); font-size: 12px; color: var(--text2); margin-bottom: 3px; }
  .usage-model .t { font-family: var(--font); font-size: 12px; color: var(--text4); }
  /* 用量限额进度条(5h 窗 / 周限额)。阈值配色语义:<60% status 绿 / 60-85% ident 黄 / >85% chrome 红 */
  .quota-row { padding: 10px 2px; }
  .quota-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .quota-label { font-family: var(--font-cn); font-size: 13px; color: var(--text2); }
  .quota-pct { font-family: var(--font); font-size: 13px; color: var(--text3); font-variant-numeric: tabular-nums; }
  .quota-track { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.08); overflow: hidden; }
  .quota-fill { height: 100%; border-radius: 3px; transition: width 200ms ease; }
  .quota-fill.green { background: #1DED83; }
  .quota-fill.yellow { background: #F8EF00; }
  .quota-fill.red { background: #F75049; }
  .quota-reset { font-family: var(--font); font-size: 11px; color: var(--text4); margin-top: 5px; }
  .usage-note { font-family: var(--font-cn); font-size: 12px; color: var(--text4); padding: 8px 2px 2px; line-height: 1.5; }
  @media (prefers-reduced-motion: reduce) { .quota-fill { transition: none; } }

  /* ---- 状态页(仪表盘)四卡 ---- */
  .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .status-card { background: var(--surface); border: 1px solid var(--border);
                 border-radius: 12px; padding: 14px; min-height: 92px;
                 display: flex; flex-direction: column; }
  .status-card.disabled { opacity: 0.3; }  /* 情感未装配:诚实的空槽,禁用态 */
  .sc-label { font-family: var(--font-cn); font-size: 12px; color: var(--text3);
              letter-spacing: 0.04em; display: flex; align-items: center; gap: 6px; }
  .sc-label .status-dot { position: relative; top: 0; }
  /* 大字紧跟 label(固定间距,不 bottom-align),四卡 value 基线一致,不受小字行数影响 */
  .sc-value { font-family: var(--font-cn); font-size: 17px; color: var(--text); margin-top: 8px; }
  .sc-value.num { font-family: var(--font); color: var(--accent); }
  /* min-height 恒占一行:四卡都留出小字行的位置,大字基线对齐(不因有无小字而错位) */
  .sc-sub { font-family: var(--font); font-size: 11px; color: var(--text4); margin-top: 4px; min-height: 14px; }
  .status-cta { margin-top: 16px; }
  .reconnect-btn { width: 100%; padding: 12px; border-radius: 12px; cursor: pointer;
                   background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-border);
                   font-family: var(--font-cn); font-size: 14px; min-height: 44px; }
  .reconnect-btn:active { background: rgba(217,119,87,0.18); }

  /* ---- 首航流程(零会话:自检 + 双向取名)---- */
  .onboarding { position: fixed; inset: 0; z-index: 200; background: var(--bg);
                display: flex; align-items: center; justify-content: center; padding: 24px; }
  .onboarding[hidden] { display: none; }
  .ob-card { width: 100%; max-width: 420px; display: flex; flex-direction: column; }
  .ob-title { font-family: var(--font-cn); font-size: 22px; font-weight: 300; letter-spacing: 0.06em; }
  .ob-sub { font-family: var(--font-cn); font-size: 13px; color: var(--text3); margin: 8px 0 20px; }
  .ob-check-row { display: flex; gap: 12px; align-items: flex-start; padding: 12px 0;
                  border-bottom: 1px solid rgba(255,255,255,0.06); }

<body>

<div class="vignette"></div>

<!-- Sidebar -->

  <div class="input-area">

<!-- 记忆视图 -->

<!-- 首航流程(零会话首启:自检 → 双向取名 → 进聊天;可跳过) -->

<script>

let ws, busy = false, currentAssistantRow = null, assistantText = '';
let currentSessionId = localStorage.getItem('currentSessionId') || null;
let typingEl = null, lastMsgTime = null;
let ASSISTANT_NAME = 'Claude', USER_NICKNAME = 'User';

const $ = id => document.getElementById(id);
const $msg = $('messages'), $input = $('input'), $btn = $('btn'),

let currentModel = '';  // 会话内记住的模型选择,空 = 走 CLI 默认模型

const escHtml = s => (s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ===== 极简双语字典(zh 默认 / en),不引 i18n 库 =====

    memUnconf: '未配置', memOnline: '已配置 · 在线', memOffline: '已配置 · 离线',
    usage5h: '5 小时窗', usage7d: '周限额', usageResets: r => `${r} 重置`,
    usageQuotaNeedLogin: '限额数据需本机 Claude 订阅登录', usageLocalTotal: '本机累计用量',

    obCheckTitle: 'Before we start', obCheckSub: 'A quick look at your setup',

    obGuideService: 'Can\'t reach the local service — check the bridge is still running',
    obGuideCli: 'Run the claude login on your computer, then come back and retry',
    obGuideMemory: 'Memory service is configured but unreachable — you can skip for now',
    obMemOptional: 'Not connected (optional, chat still works)',
    obContinue: 'Continue', obSkip: 'Skip',
    obNameTitle: 'Let\'s get acquainted',
    obAskUser: 'What should I call you?', obAskAsst: 'What would you like to call me?', obStart: 'Start',
    modelDefault: 'Default', modelCustom: 'Custom…',
    retry: 'Resend', copy: 'Copy', speak: 'Read aloud',
    loading: 'Loading…', loadFailed: 'Failed to load',

    memNoMatch: 'No matching memories', memEmpty: 'No memories yet',

    setNick: 'Your nickname', setAsst: 'Assistant name', setTheme: 'Theme', setServer: 'Server info', setUsage: 'Usage',

    svVersion: 'Version', svService: 'Service', svHost: 'Host', svCli: 'Claude CLI', svMemory: 'Memory service',
    memUnconf: 'Not configured', memOnline: 'Configured · online', memOffline: 'Configured · offline',
    usage5h: '5-hour window', usage7d: 'Weekly limit', usageResets: r => `Resets ${r}`,
    usageQuotaNeedLogin: 'Quota needs a local Claude subscription login', usageLocalTotal: 'Local usage total',
    customModelPrompt: 'Enter model id (passed to the Claude CLI via --model):', greetingDefault: 'Hi',
    greeting: n => `Hi, ${n}`, status: (name, on) => `${name} · ${on ? 'online' : 'offline'}`,
    msgCount: n => `${n} msgs`, cache: p => `cache ${p}%`,
    thinkingChip: k => `Thinking (${k}k)`, cost: c => `$${c}`,
  },
};
const t = k => { const v = I18N[LANG][k]; return v !== undefined ? v : I18N.zh[k]; };

// 把带 data-i18n* 标记的静态元素按当前语言刷一遍(文本/占位符/title/aria-label)
function applyI18n() {
  document.documentElement.lang = LANG;
  document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.dataset.i18n));
  document.querySelectorAll('[data-i18n-ph]').forEach(el => el.placeholder = t(el.dataset.i18nPh));
  document.querySelectorAll('[data-i18n-title]').forEach(el => el.title = t(el.dataset.i18nTitle));
  document.querySelectorAll('[data-i18n-aria]').forEach(el => el.setAttribute('aria-label', t(el.dataset.i18nAria)));
  $('model-btn').textContent = t('modelDefault') + ' ▾';
  $('greeting-name').textContent = t('greeting')(USER_NICKNAME);  // 先按默认昵称铺一遍,loadConfig 再细化
}

/* ===== Config ===== */
// 昵称/助手名优先级：localStorage（本地覆写）> /config 路由（若插件提供）> 内置默认。
async function loadConfig() {
  let cfgNick = null, cfgAsst = null;
  try {
    const c = await (await fetch('/config')).json();
    cfgAsst = c.assistant_name || null;
    cfgNick = c.user_nickname || null;
  } catch (e) { /* 无 /config 插件（demo 默认态）→ 忽略，走本地/默认 */ }
  USER_NICKNAME = localStorage.getItem('userNickname') || cfgNick || USER_NICKNAME;
  ASSISTANT_NAME = localStorage.getItem('assistantName') || cfgAsst || ASSISTANT_NAME;
  $('greeting-name').textContent = t('greeting')(USER_NICKNAME);
}

function setStatus(on) {
  $dot.className = 'status-dot ' + (on ? 'on' : 'off');
  $status.textContent = t('status')(ASSISTANT_NAME, on);
  // 状态页开着时同步刷新连接卡与断连 CTA(重连成功即撤 CTA,断连即升起)
  if ($('view-status').classList.contains('active')) loadStatus();
}

/* ===== View toggles ===== */
function showGreeting() { $greeting.style.display = 'flex'; $msg.style.display = 'none'; }
function showMessages() { $greeting.style.display = 'none'; $msg.style.display = 'flex'; }
function setSessionId(id) {
  currentSessionId = id;
  if (id) localStorage.setItem('currentSessionId', id);
  else localStorage.removeItem('currentSessionId');
}
function setBusy(b) { busy = b; $btn.disabled = b; }

/* ===== Sidebar ===== */
function openSidebar() { loadSessions(); $('sidebar').classList.add('open'); $('overlay').classList.add('open'); }
function closeSidebar() { $('sidebar').classList.remove('open'); $('overlay').classList.remove('open'); }

async function loadSessions() {
  try {
    const sessions = await (await fetch('/sessions?limit=30')).json();
    const list = $('session-list');
    list.innerHTML = '';
    sessions.forEach(s => {
      const el = document.createElement('div');
      el.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
      const date = s.updated_at ? new Date(s.updated_at).toLocaleDateString(LANG === 'zh' ? 'zh-CN' : 'en-US', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}) : '';
      el.innerHTML = `<div class="s-title">${escHtml(s.title || t('newChat'))}</div>
                      <div class="s-meta">${t('msgCount')(s.msg_count)} · ${date}</div>`;
      el.onclick = () => switchSession(s.id);
      list.appendChild(el);
    });
  } catch (e) { console.error('loadSessions', e); }
}

async function switchSession(sid) {
  openPage('chat');  // 桌面常驻侧边栏下,若正停在子页,选会话要先跳回聊天(顺带收抽屉)
  if (sid === currentSessionId) return;
  $msg.innerHTML = '';
  setSessionId(sid);
  currentAssistantRow = null; assistantText = '';
  showMessages();
  await loadHistory(sid);
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ switch_session: sid }));
}

function newConversation() {
  openPage('chat');  // 同上:从子页新建对话也要跳回聊天
  $msg.innerHTML = '';
  setSessionId(null);
  currentAssistantRow = null; assistantText = '';
  showGreeting();
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ switch_session: null }));
}

async function loadHistory(sid) {
  const notice = document.createElement('div');
  notice.className = 'history-notice';
  notice.textContent = t('loading');
  $msg.appendChild(notice);
  try {
    const msgs = await (await fetch(`/sessions/${sid}/messages`)).json();
    notice.remove();
    msgs.forEach(m => {
      if (m.role === 'user') addMsg('user', m.content);
      else if (m.role === 'assistant') {
        if (m.metadata && m.metadata.thinking) addThinkingChip(m.metadata.thinking);
        const row = addMsg('assistant', m.content);
        addAssistantToolbar(row, m.content);
        if (m.metadata && m.metadata.usage)
          addUsage({ cost_usd: m.metadata.cost_usd, duration_ms: m.metadata.duration_ms, usage: m.metadata.usage });
      }
    });
  } catch (e) { notice.textContent = t('loadFailed'); }
}

/* ===== Time divider ===== */
function maybeTimeDivider() {
  const now = Date.now();
  if (!lastMsgTime || (now - lastMsgTime) > 5 * 60 * 1000) {
    const d = new Date();
    const hh = String(d.getHours()).padStart(2,'0'), mm = String(d.getMinutes()).padStart(2,'0');
    let label;
    if (LANG === 'zh') {
      const w = ['周日','周一','周二','周三','周四','周五','周六'];
      label = `${d.getMonth()+1}月${d.getDate()}日 ${w[d.getDay()]} ${hh}:${mm}`;
    } else {
      const w = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      label = `${w[d.getDay()]} ${mo[d.getMonth()]} ${d.getDate()}, ${hh}:${mm}`;
    }
    const div = document.createElement('div');
    div.className = 'time-divider';
    div.textContent = label;
    $msg.appendChild(div);
  }
  lastMsgTime = now;
}

/* ===== Messages ===== */
function addMsg(cls, text) {
  showMessages();
  const row = document.createElement('div');
  row.className = 'msg-row ' + cls;
  if (cls === 'assistant' && text) {
    text.split(/\n\n+/).filter(Boolean).forEach(p => {
      const b = document.createElement('div');
      b.className = 'msg-bubble assistant';
      b.textContent = p;
      row.appendChild(b);
    });
  } else if (cls === 'user') {
    const wrap = document.createElement('div');
    wrap.className = 'msg-user-wrap';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble user';
    bubble.textContent = text;
    const btn = document.createElement('button');
    btn.className = 'retry-btn'; btn.title = t('retry');
    btn.innerHTML = '<i class="ti ti-refresh"></i>';
    btn.onclick = () => retryMsg(text);
    wrap.appendChild(bubble); wrap.appendChild(btn);
    row.appendChild(wrap);
  } else {
    const b = document.createElement('div');
    b.className = 'msg-bubble ' + cls;
    b.textContent = text;
    row.appendChild(b);
  }
  $msg.appendChild(row);
  $msg.scrollTop = $msg.scrollHeight;
  return row;
}

function updateAssistantBubbles(row, fullText) {
  const paragraphs = fullText.split(/\n\n+/).filter(Boolean);
  const bubbles = row.querySelectorAll('.msg-bubble');
  paragraphs.forEach((p, i) => {
    if (i < bubbles.length) bubbles[i].textContent = p;
    else {
      const b = document.createElement('div');
      b.className = 'msg-bubble assistant';
      b.textContent = p;
      row.appendChild(b);
    }
  });
  $msg.scrollTop = $msg.scrollHeight;
}

// beforeEl 给定时把 chip 插到该元素之前(用于实时路径把 chip 放到气泡上方,
// 与历史路径统一——chip 一律在气泡上方)
function addThinkingChip(text, beforeEl) {
  const row = document.createElement('div');
  row.className = 'chip-row';
  const chip = document.createElement('button');
  chip.className = 'chip';
  chip.innerHTML = `<i class="ti ti-sparkles"></i> ${t('thinkingChip')((text.length/1000).toFixed(1))}`;
  chip.onclick = () => openSheet('Thinking', text);
  row.appendChild(chip);
  if (beforeEl) $msg.insertBefore(row, beforeEl);
  else $msg.appendChild(row);
  $msg.scrollTop = $msg.scrollHeight;
}

function addToolChip(tool, preview) {
  const row = document.createElement('div');
  row.className = 'chip-row';
  const chip = document.createElement('button');
  chip.className = 'chip tool';
  chip.innerHTML = `<i class="ti ti-tool"></i> ${escHtml(tool)}`;
  if (preview) chip.onclick = () => openSheet(tool, preview);
  row.appendChild(chip);
  $msg.appendChild(row);
  $msg.scrollTop = $msg.scrollHeight;
}

function addUsage(data) {
  const el = document.createElement('div');
  el.className = 'usage-bar';
  const dur = data.duration_ms ? `${(data.duration_ms/1000).toFixed(1)}s` : '';
  const cost = data.cost_usd ? `$${data.cost_usd.toFixed(4)}` : '';
  const u = data.usage || {};
  const cache = u.cache_hit_pct !== undefined ? t('cache')(u.cache_hit_pct) : '';
  const tokens = (u.input_tokens || u.output_tokens) ? `↓${u.input_tokens} ↑${u.output_tokens}` : '';
  const parts = [dur, cost, cache, tokens].filter(Boolean).slice(0, 3);  // 只留前三项(对齐私有仓生产前端)
  el.innerHTML = parts.map(p => `<span>${escHtml(p)}</span>`).join('');
  $msg.appendChild(el);
  $msg.scrollTop = $msg.scrollHeight;
}

/* ===== 助手回复工具条(复制 / 朗读)===== */
let speakingBtn = null;  // 当前正在朗读的按钮,用于播放/停止切换

// 在助手回复行底部挂工具条。复制/朗读各自按能力降级:
// 复制仅在 clipboard API 可用(安全上下文)时出现,朗读仅在支持 Web Speech API 时出现。
function addAssistantToolbar(row, text) {
  if (!row || !text) return;
  const bar = document.createElement('div');
  bar.className = 'msg-toolbar';
  if (navigator.clipboard && navigator.clipboard.writeText) {
    const copyBtn = document.createElement('button');
    copyBtn.className = 'msg-tool-btn';
    copyBtn.title = t('copy');
    copyBtn.innerHTML = '<i class="ti ti-copy"></i>';
    copyBtn.onclick = () => copyText(text, copyBtn);
    bar.appendChild(copyBtn);
  }
  if ('speechSynthesis' in window) {
    const speakBtn = document.createElement('button');
    speakBtn.className = 'msg-tool-btn';
    speakBtn.title = t('speak');
    speakBtn.innerHTML = '<i class="ti ti-volume"></i>';
    speakBtn.onclick = () => toggleSpeak(text, speakBtn);
    bar.appendChild(speakBtn);
  }
  if (bar.children.length) row.appendChild(bar);
}

async function copyText(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    btn.innerHTML = '<i class="ti ti-check"></i>';
    setTimeout(() => { btn.innerHTML = '<i class="ti ti-copy"></i>'; }, 1200);
  } catch (e) { /* 复制失败(权限/上下文)→ 静默,不打断阅读 */ }
}

// 播放/停止切换:点正在朗读的按钮=停止;点别的=停旧的、读新的。
// 语言跟随回复内容:含中日韩字符走 zh-CN,否则 en-US。
function toggleSpeak(text, btn) {
  const synth = window.speechSynthesis;
  if (speakingBtn === btn) { synth.cancel(); resetSpeakBtn(); return; }
  if (synth.speaking || speakingBtn) { synth.cancel(); resetSpeakBtn(); }
  const u = new SpeechSynthesisUtterance(text);
  u.lang = /[一-鿿぀-ヿ가-힯]/.test(text) ? 'zh-CN' : 'en-US';
  u.onend = u.onerror = () => resetSpeakBtn();
  speakingBtn = btn;
  btn.classList.add('speaking');
  btn.innerHTML = '<i class="ti ti-player-stop"></i>';
  synth.speak(u);
}
function resetSpeakBtn() {
  if (!speakingBtn) return;
  speakingBtn.classList.remove('speaking');
  speakingBtn.innerHTML = '<i class="ti ti-volume"></i>';
  speakingBtn = null;
}

function showTyping() {
  removeTyping();
  typingEl = document.createElement('div');
  typingEl.className = 'typing';
  typingEl.textContent = '…';
  $msg.appendChild(typingEl);
  $msg.scrollTop = $msg.scrollHeight;

function removeTyping() { if (typingEl) { typingEl.remove(); typingEl = null; } }

/* ===== Send ===== */
function send() {
  const text = $input.value.trim();
  if (!text || busy || !ws || ws.readyState !== 1) return;
  maybeTimeDivider();
  addMsg('user', text);
  $input.value = '';
  $input.style.height = 'auto';

}

function retryMsg(text) {
  if (!text || busy || !ws || ws.readyState !== 1) return;
  currentAssistantRow = null; assistantText = '';
  ws.send(JSON.stringify({ text, model: currentModel || undefined }));
  setBusy(true);
  showTyping();
}

});

/* ===== WebSocket ===== */
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    setStatus(true);
    if (currentSessionId) ws.send(JSON.stringify({ switch_session: currentSessionId }));
  };
  ws.onclose = () => { setStatus(false); setBusy(false); setTimeout(connect, 2000); };
  ws.onerror = () => setStatus(false);

  ws.onmessage = ev => {
    let m; try { m = JSON.parse(ev.data); } catch { return; }
    switch (m.type) {
      case 'hello': break;
      case 'session': setSessionId(m.session_id); break;
      case 'session_switched': break;
      case 'session_expired': break;
      case 'status': break;
      case 'memory_recall':
        if (m.context) addThinkingChipRecall(m.context);
        break;
      case 'thinking':
        // streamed thinking deltas are summarized via the result.thinking chip
        break;
      case 'tool_use':
        removeTyping();
        addToolChip(m.tool, m.input_preview);
        break;
      case 'text':
        removeTyping();
        assistantText += m.text;
        if (!currentAssistantRow) currentAssistantRow = addMsg('assistant', '');
        updateAssistantBubbles(currentAssistantRow, assistantText);
        break;
      case 'result':
        removeTyping();
        // 先确保气泡存在(无流式 text 时用 result.text 建),再把 thinking chip
        // 插到气泡上方——与历史路径统一,chip 一律在气泡上方,刷新前后位置一致
        if (m.text && !assistantText) { currentAssistantRow = addMsg('assistant', m.text); assistantText = m.text; }
        if (m.thinking) addThinkingChip(m.thinking, currentAssistantRow || undefined);
        if (currentAssistantRow && assistantText) addAssistantToolbar(currentAssistantRow, assistantText);
        if (m.usage) addUsage({ cost_usd: m.cost_usd, duration_ms: m.duration_ms, usage: m.usage });
        if (m.session_id) setSessionId(m.session_id);
        currentAssistantRow = null; assistantText = '';
        setBusy(false);
        break;
      case 'error':
        removeTyping();
        addMsg('system', '⚠ ' + (m.message || 'error') + (m.detail ? '\n' + m.detail : ''));
        setBusy(false);
        break;
    }
  };
}

function addThinkingChipRecall(text) {
  const row = document.createElement('div');
  row.className = 'chip-row';

const debounce = (fn, ms) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; };

const PAGES = ['chat', 'memory', 'status', 'settings'];
// 聊天永远是"家";记忆/状态/设置从侧边栏进,子页全屏推入,← 或选"聊天"回家。
function openPage(name) {
  PAGES.forEach(p => $('view-' + p).classList.toggle('active', p === name));
  document.querySelectorAll('.sidebar-nav .nav-item').forEach(b =>
    b.classList.toggle('active', b.dataset.page === name));  // 聊天无 nav 项 → 三项全熄
  closeSidebar();  // 移动端:选完收起抽屉;桌面常驻态 closeSidebar 是空操作
  if (name === 'memory') loadMemory();
  if (name === 'status') loadStatus();
  if (name === 'settings') loadSettings();
}

/* ===== Memory tab（三态：正常 / 未配置 / 服务挂）===== */
function memGuide(title, sub) {
  return `<div class="mem-empty">${escHtml(title)}<br><span class="sub">${escHtml(sub)}</span></div>`;
}

async function loadMemory() {
  const body = $('memory-body');
  body.innerHTML = memGuide(t('loading'), '');
  let resp;
  try {
    resp = await fetch('/memory-admin/memory/stats');
  } catch (e) {
    // 网络层失败（少见）——当降级处理，聊天不受影响
    body.innerHTML = memGuide(t('memConnFail'), t('memConnFailSub'));
    return;
  }
  // 404：/memory-admin/* 代理路由未注册 → NullProvider（未配置记忆服务）
  if (resp.status === 404) {
    body.innerHTML = memGuide(t('memUnconfigured'), t('memUnconfiguredSub'));
    return;
  }
  // 502 等：配了 URL 但记忆服务挂了 → 降级提示（不是白屏/裸 500）
  if (!resp.ok) {
    body.innerHTML = memGuide(t('memUnavailable'), t('memUnavailableSub'));
    return;
  }
  const stats = await resp.json();
  body.innerHTML = `
    <div class="mem-stat">
      <div><div class="num">${stats.count ?? 0}</div><div class="lbl">${t('memCount')}</div></div>
      <div><div class="num">${stats.total_chars ?? 0}</div><div class="lbl">${t('memChars')}</div></div>
    </div>
    <div class="mem-search"><input id="mem-q" placeholder="${t('memSearchPlaceholder')}" autocomplete="off"></div>
    <div id="mem-list"></div>`;
  $('mem-q').oninput = debounce(() => refreshMemList($('mem-q').value.trim()), 300);
  refreshMemList('');
}

async function refreshMemList(query) {
  const list = $('mem-list');
  if (!list) return;
  const url = query
    ? `/memory-admin/memory/search?q=${encodeURIComponent(query)}`
    : '/memory-admin/memory/list';
  let items = [];
  try {
    const r = await fetch(url);
    if (r.ok) items = (await r.json()).items || [];
  } catch (e) { /* 保底空列表 */ }
  if (!items.length) {
    list.innerHTML = `<div class="mem-empty">${query ? t('memNoMatch') : t('memEmpty')}</div>`;
    return;
  }
  list.innerHTML = '';
  items.forEach(m => {
    const el = document.createElement('div');
    el.className = 'mem-item';
    const b = document.createElement('div');
    b.className = 'body';
    b.textContent = m.content;
    const del = document.createElement('button');
    del.className = 'del';
    del.innerHTML = '<i class="ti ti-trash"></i>';
    del.onclick = () => deleteMemory(m.id, m.content);
    el.appendChild(b);
    el.appendChild(del);
    list.appendChild(el);
  });
}

async function deleteMemory(id, preview) {
  if (!confirm(t('memDeleteConfirm') + '\n\n' + (preview || '').slice(0, 60))) return;
  try {
    const r = await fetch(`/memory-admin/memory/${id}`, { method: 'DELETE' });
    if (!r.ok && r.status !== 404) { alert(t('memDeleteFailed')); return; }
  } catch (e) { alert(t('memDeleteFailed')); return; }
  const q = $('mem-q');
  await refreshMemList(q ? q.value.trim() : '');
  updateMemStats();
  loadSignature();  // 删的可能正是最新一条,顶栏签名行同步刷新
}

async function updateMemStats() {
  try {
    const r = await fetch('/memory-admin/memory/stats');
    if (!r.ok) return;
    const s = await r.json();
    const nums = document.querySelectorAll('#memory-body .mem-stat .num');
    if (nums[0]) nums[0].textContent = s.count ?? 0;
    if (nums[1]) nums[1].textContent = s.total_chars ?? 0;
  } catch (e) { /* 忽略 */ }
}

async function loadServerInfo() {
  const box = $('server-info');
  let health = null;
  try { const r = await fetch('/health'); if (r.ok) health = await r.json(); } catch (e) { /* 降级 */ }
  // 记忆服务配置状态：探测代理端点（404=未配置，200=在线，其余=已配置但离线）
  let memStatus = t('memUnconf');
  try {
    const r = await fetch('/memory-admin/memory/stats');
    if (r.status === 404) memStatus = t('memUnconf');
    else if (r.ok) memStatus = t('memOnline');

    [t('svHost'), health ? (health.hostname || '—') : '—'],
    [t('svCli'), health ? (health.claude_cli || '—') : '—'],
    [t('svMemory'), memStatus],
  ];

// 打开设置页时拉取一次(不做后台轮询):
//   quota 可用 → 两条利用率进度条(5h 窗 / 周限额),阈值配色 + resets_at 本地时间;
//   不可用(未登录/API 模式/端点异常)→ 本机 token 累计简计 + 说明行,零报错零死按钮。
async function loadUsage() {
  const box = $('usage-info');
  let quota = null;
  try { const r = await fetch('/usage/quota'); if (r.ok) quota = await r.json(); } catch (e) { /* 静默降级 */ }
  if (quota && quota.available) {
    const bars = quotaBar(t('usage5h'), quota.five_hour) + quotaBar(t('usage7d'), quota.seven_day);
    if (bars) { box.innerHTML = bars; return; }  // 两条都缺字段则往下走降级
  }
  box.innerHTML = await fallbackUsage();
}

// 单条限额进度条。utilization 缺失/非数返回空串(该条不渲染)。
// 阈值配色语义(spec):<60% 绿 / 60-85% 黄 / >85% 红。
function quotaBar(label, d) {
  const pct = (d && typeof d.utilization === 'number') ? d.utilization : null;
  if (pct === null) return '';
  const band = pct < 60 ? 'green' : (pct <= 85 ? 'yellow' : 'red');
  const w = Math.max(0, Math.min(pct, 100));
  const resetLine = d.resets_at
    ? `<div class="quota-reset">${escHtml(t('usageResets')(fmtReset(d.resets_at)))}</div>` : '';
  return `<div class="quota-row">
    <div class="quota-head"><span class="quota-label">${escHtml(label)}</span><span class="quota-pct">${Math.round(pct)}%</span></div>
    <div class="quota-track"><div class="quota-fill ${band}" style="width:${w}%"></div></div>
    ${resetLine}
  </div>`;
}

// resets_at(带时区 ISO)→ 本地时间字符串;解析失败原样回退,不抛错
function fmtReset(iso) {
  try { const d = new Date(iso); return isNaN(d.getTime()) ? iso : d.toLocaleString(); }
  catch (e) { return iso; }
}

// 限额不可用时的降级:本机 token 累计总数(不分模型)+ 说明行
async function fallbackUsage() {
  let stats = null;
  try { const r = await fetch('/usage/stats'); if (r.ok) stats = await r.json(); } catch (e) { /* 静默降级 */ }
  const sum = ((stats && stats.total) || []).reduce(
    (s, r) => s + (r.input_tokens || 0) + (r.output_tokens || 0), 0);
  return `<div class="usage-model"><div class="m">${t('usageLocalTotal')}</div>` +
    `<div class="t">${sum.toLocaleString()} tokens</div></div>` +
    `<div class="usage-note">${t('usageQuotaNeedLogin')}</div>`;
}

/* ===== 状态页(仪表盘):连接 / 记忆 / 模型 / 情感 四卡 + 断连 CTA ===== */
async function loadStatus() {
  const body = $('status-body');
  const connected = !!(ws && ws.readyState === 1);

  // 连接卡:WS 在线态 + /health 的 CLI 探测
  let cliText = '';
  try {
    const r = await fetch('/health');
    if (r.ok) { const h = await r.json();
      cliText = h.claude_cli === 'found' ? t('scCliReady') : t('scCliMissing'); }
  } catch (e) { /* 探测失败 → CLI 子行留空 */ }

  // 记忆卡:stats 条数|字数;404/失败 = 记忆库未连接(灰值)。记忆是已实现接口,
  // 未接库用「未连接」,与「情感」那种尚未实现的接口用「未装配」区分开。
  // memHint 给一句怎么连的指引(仅检测与指引,配置本身仍在电脑侧,见账号边界裁决):
  //   404 未配置 → 提示设 MEMORY_SERVICE_URL;非 404 = 配了但连不上 → 提示已配置暂不可达。
  let memValue = t('scNotConnected'), memFitted = false, memHint = t('scMemHintSet');
  try {
    const r = await fetch('/memory-admin/memory/stats');
    if (r.ok) { const s = await r.json();
      memValue = t('scMemFmt')(s.count ?? 0, s.total_chars ?? 0); memFitted = true; memHint = ''; }
    else if (r.status !== 404) memHint = t('scMemHintDown');
  } catch (e) { memHint = t('scMemHintDown'); }

  // 模型卡:复用输入区已选模型(空 = 走 CLI 默认)
  const modelText = currentModel || t('scModelDefault');
  const dot = on => `<span class="status-dot ${on ? 'on' : 'off'}"></span>`;

  body.innerHTML = `
    <div class="status-grid">
      <div class="status-card">
        <div class="sc-label">${dot(connected)}${t('scConnection')}</div>
        <div class="sc-value">${connected ? t('scOnline') : t('scOffline')}</div>
        <div class="sc-sub">${escHtml(cliText)}</div>
      </div>
      <div class="status-card">
        <div class="sc-label">${t('scMemory')}</div>
        <div class="sc-value ${memFitted ? 'num' : ''}">${escHtml(memValue)}</div>
        <div class="sc-sub">${escHtml(memHint)}</div>
      </div>
      <div class="status-card">
        <div class="sc-label">${t('scModel')}</div>
        <div class="sc-value">${escHtml(modelText)}</div>
        <div class="sc-sub"></div>
      </div>
      <div class="status-card disabled">
        <div class="sc-label">${t('scEmotion')}</div>
        <div class="sc-value">${t('scUnfitted')}</div>
        <div class="sc-sub"></div>
      </div>
    </div>
    ${connected ? '' : `<div class="status-cta"><button class="reconnect-btn" onclick="connect()">${t('scReconnect')}</button></div>`}`;
}

/* ===== 主题切换机制(可切换主题,非前端插件)=====
   约定:static/themes/<名>/theme.css 用 :root 覆盖 CSS 变量(设计 token);
   可选同目录 theme.js = I18N 覆盖 + 启动模块挂点(本 spec 只留约定,不加载执行)。
   默认「简洁」= 不挂任何 <link>,故默认态零 themes/ 请求。 */
function applyTheme(name) {
  let link = document.getElementById('theme-css');
  if (!name) {                       // 简洁(默认):移除主题 link,不发 themes/ 请求
    if (link) link.remove();
    return;
  }
  if (!link) {                       // 首次挂载:<link> 追加到 head 末尾,晚于主 <style> → 覆盖生效
    link = document.createElement('link');
    link.id = 'theme-css'; link.rel = 'stylesheet';
    document.head.appendChild(link);
  }
  link.href = `/themes/${name}/theme.css`;
  // 挂点:此处可按约定再加载 themes/<name>/theme.js(文案包/启动模块),本 spec 不实现。
}

// 设置页选择器回调:写 localStorage 记住,立即应用(刷新后 boot 复原)
function onThemeChange(name) {
  if (name) localStorage.setItem('theme', name); else localStorage.removeItem('theme');
  applyTheme(name);
}

/* ===== 签名行(顶栏名字下:最新一条记忆摘要)===== */
// 纯展示不可点(spec 开工默认值 #1,跳转留给主题包/v0.2)。
// NullProvider(404)/服务失联 → 不渲染,顶栏收缩(hidden 从布局移除)。
async function loadSignature() {
  const el = $('signature');
  try {
    const r = await fetch('/memory-admin/memory/list');
    if (!r.ok) { el.hidden = true; return; }      // 404 未装配 / 502 失联 → 收起
    const items = (await r.json()).items || [];
    // 取最新一条:约定 list 返回按时间倒序(items[0] 最新);若接入服务是正序则取末条
    const latest = items[0];
    if (!latest || !latest.content) { el.hidden = true; return; }
    el.textContent = latest.content.replace(/\s+/g, ' ').trim().slice(0, 80);
    el.hidden = false;
  } catch (e) { el.hidden = true; }                // 网络层失败也收起,不打断聊天
}

/* ===== 侧边栏版本铭牌 ===== */
async function loadVersion() {
  try {
    const r = await fetch('/health');
    if (r.ok) { const h = await r.json(); $('sidebar-version').textContent = h.version ? 'Pando v' + h.version : 'Pando'; }
  } catch (e) { /* 拿不到版本 → 铭牌留空,不报错 */ }
}

/* ===== 移动端左缘右滑呼出侧边栏(桌面常驻态不需要)===== */
let edgeX = null, edgeY = null;
document.addEventListener('touchstart', e => {
  if (window.innerWidth >= 768) return;
  const p = e.touches[0];
  if (p.clientX <= 24 && !$('sidebar').classList.contains('open')) { edgeX = p.clientX; edgeY = p.clientY; }
  else edgeX = null;
}, { passive: true });
document.addEventListener('touchend', e => {
  if (edgeX === null) return;
  const p = e.changedTouches[0];
  if (p.clientX - edgeX > 60 && Math.abs(p.clientY - edgeY) < 50) openSidebar();  // 右滑够远、竖向漂移小
  edgeX = null;
}, { passive: true });

/* ===== 首航流程(零会话:自检 → 双向取名)===== */
// 只在 GET /sessions 为空时触发(有会话即老用户,不打扰)。文案平实中立,
// Ghost 叙事版归主题包(spec 不做什么)。
async function maybeOnboard() {
  await obRenderCheck();
  $('ob-nick').value = localStorage.getItem('userNickname') || '';  // 名字预填(已填过则免重输)
  $('ob-asst').value = localStorage.getItem('assistantName') || '';
  $('ob-check').hidden = false;
  $('ob-name').hidden = true;
  $('onboarding').hidden = false;
}

// 自检三项复用 /health + 记忆探测:红项(✗)给一句人话指引,不甩裸 JSON。
// 记忆服务是可选项:未配置显示中性(–)不算红,降级才给提示。
async function obRenderCheck() {
  let health = null;
  try { const r = await fetch('/health'); if (r.ok) health = await r.json(); } catch (e) { /* 服务不可达 */ }
  const svcOk = !!health;
  const cliOk = !!health && health.claude_cli === 'found';
  let memState = 'degraded';
  try {
    const r = await fetch('/memory-admin/memory/stats');
    memState = r.ok ? 'ok' : (r.status === 404 ? 'unconf' : 'degraded');
  } catch (e) { memState = 'degraded'; }
  const rows = [
    { ok: svcOk, label: t('obChkService'), guide: svcOk ? '' : t('obGuideService') },
    { ok: cliOk, label: t('obChkCli'), guide: cliOk ? '' : t('obGuideCli') },
    { ok: memState === 'ok', neutral: memState === 'unconf', label: t('obChkMemory'),
      guide: memState === 'degraded' ? t('obGuideMemory') : (memState === 'unconf' ? t('obMemOptional') : '') },
  ];
  $('ob-check-list').innerHTML = rows.map(r => {
    const icon = r.ok ? '✓' : (r.neutral ? '–' : '✗');
    const cls = r.ok ? 'ok' : (r.neutral ? 'neutral' : 'bad');
    return `<div class="ob-check-row ${cls}"><span class="ob-chk-icon">${icon}</span>
      <div><div class="ob-chk-label">${escHtml(r.label)}</div>
      ${r.guide ? `<div class="ob-chk-guide">${escHtml(r.guide)}</div>` : ''}</div></div>`;
  }).join('');
}

function obNext() { $('ob-check').hidden = true; $('ob-name').hidden = false; }

// 双向取名落既有 userNickname/assistantName 键(与设置页 saveIdentity 同源)
function obFinishNames() {
  const nick = $('ob-nick').value.trim(), asst = $('ob-asst').value.trim();
  if (nick) localStorage.setItem('userNickname', nick);
  if (asst) localStorage.setItem('assistantName', asst);
  USER_NICKNAME = nick || USER_NICKNAME;
  ASSISTANT_NAME = asst || ASSISTANT_NAME;
  $('greeting-name').textContent = t('greeting')(USER_NICKNAME);
  setStatus(!!(ws && ws.readyState === 1));
  obFinish();
}

function obFinish() { $('onboarding').hidden = true; }

/* ===== Boot ===== */
async function boot() {
  applyTheme(localStorage.getItem('theme') || '');  // 复原上次主题(默认简洁则零 themes/ 请求)
  applyI18n();  // 先按当前语言刷静态文案,再加载配置/连接
  await loadConfig();
  loadVersion();
  loadSignature();  // 顶栏签名行:最新记忆摘要(无记忆服务则不渲染)
  loadSessions();  // 桌面常驻侧边栏开屏即填充(移动端抽屉打开时会再刷一次)
  if (currentSessionId) { showMessages(); await loadHistory(currentSessionId); }
  else {
    showGreeting();
    // 零会话首航:GET /sessions 为空 → 自检 + 双向取名;有会话不触发,拉取失败不阻断
    try {
      const sessions = await (await fetch('/sessions?limit=1')).json();
      if (Array.isArray(sessions) && sessions.length === 0) await maybeOnboard();
    } catch (e) { /* 忽略,直接进聊天 */ }
  }
  connect();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
}
boot();
</script>
