<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#faf9f5">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Pando</title>
<style>
  /* 自托管字体(CONSTRAINTS 禁 CDN):Inter=UI/数字,JetBrains Mono=代码;中文走系统栈 */
  @font-face{font-family:'Inter';font-style:normal;font-weight:400;font-display:swap;src:url('/fonts/inter-400.woff2') format('woff2')}
  @font-face{font-family:'Inter';font-style:normal;font-weight:500;font-display:swap;src:url('/fonts/inter-500.woff2') format('woff2')}
  @font-face{font-family:'Inter';font-style:normal;font-weight:600;font-display:swap;src:url('/fonts/inter-600.woff2') format('woff2')}
  @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:400;font-display:swap;src:url('/fonts/jetbrains-mono-400.woff2') format('woff2')}
  @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:500;font-display:swap;src:url('/fonts/jetbrains-mono-500.woff2') format('woff2')}

  :root{
    --ui:'Inter',-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',system-ui,sans-serif;
    --code:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    /* 中性(源自 Pando 原型.dc.html) */
    --bg:#FAF9F5; --card:#fff; --surface:#F5F4ED; --track:#F0EEE6;
    --text:#141413; --ink:#1F1E1D; --text2:#3D3D3A; --dim:#73726C; --faint:#9C9A92; --fainter:#B0AEA4; --hint:#C2C0B6; --icon:#8B8A83;
    --line:rgba(31,30,29,.1); --line-soft:rgba(31,30,29,.06); --line-strong:rgba(31,30,29,.14);
    /* clay + 语义 */
    --accent:#D97757; --accent-press:#C6613F; --accent-bg:rgba(217,119,87,.1); --accent-bd:rgba(217,119,87,.22);
    --online:#5B9A5B; --warn:#D6A417; --danger:#B53333; --danger-text:#B15A32; --link:#2C84DB;
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--ui);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;
       display:flex;flex-direction:column;height:100dvh;overflow:hidden}
  a{color:var(--link);text-decoration:none}
  button{font-family:inherit}
  ::-webkit-scrollbar{width:0;height:0}
  .pd-scroll{-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .blink{animation:bk 1.05s steps(1) infinite}@keyframes bk{50%{opacity:0}}
  .spin{animation:sp .7s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){.blink,.spin{animation:none}}
  svg{display:block}

  /* ---- shell ---- */
  .app{flex:1;display:flex;flex-direction:column;min-height:0;position:relative;overflow:hidden;
       max-width:520px;width:100%;margin:0 auto}
  .view{flex:1;min-height:0;display:none;flex-direction:column}
  .view.active{display:flex}

  /* ---- top header (home/chat) ---- */
  .top{display:flex;align-items:center;gap:11px;padding:10px 18px 0;flex-shrink:0}
  .icon-btn{border:none;background:none;padding:6px;color:var(--icon);cursor:pointer;display:flex;flex-shrink:0}
  .icon-btn.lead{margin-left:-6px}
  .top-id{flex:1;min-width:0;display:flex;align-items:center;gap:7px}
  .top-id .nm{font:600 13.5px var(--ui);color:var(--text)}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--online);box-shadow:0 0 0 3px rgba(91,154,91,.16)}
  .dot.off{background:var(--danger);box-shadow:0 0 0 3px rgba(181,51,51,.14)}
  .divider{margin:12px 18px 0;height:1px;background:var(--line-soft);flex-shrink:0}

  /* ---- home ---- */
  .home-body{flex:1;min-height:0;overflow:auto;display:flex;flex-direction:column;justify-content:center}
  .hero{padding:26px 24px 14px;display:flex;flex-direction:column;align-items:center;flex-shrink:0}
  .hero-ring{width:66px;height:66px;border-radius:50%;border:1px solid var(--accent-bd);display:flex;align-items:center;justify-content:center;margin-bottom:16px;position:relative}
  .hero-ring::after{content:'';position:absolute;inset:-9px;border-radius:50%;border:1px solid rgba(217,119,87,.09)}
  .hero-mark{width:50px;height:50px;border-radius:50%;background:var(--accent-bg);border:1px solid var(--accent-bd);display:flex;align-items:center;justify-content:center}
  .hero-name{font:600 24px var(--ui);letter-spacing:.03em;color:var(--text);margin-bottom:6px}
  .hero-sub{font:400 12px var(--ui);color:var(--faint)}
  .recent{padding:26px 28px 0}
  .recent-h{font:600 10.5px var(--ui);letter-spacing:.1em;color:var(--hint);text-transform:uppercase;padding:0 0 2px}
  .recent-item{display:flex;align-items:baseline;gap:10px;padding:11px 0;border-bottom:1px solid rgba(31,30,29,.05);cursor:pointer}
  .recent-item .t{flex:1;font:400 14px var(--ui);color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .recent-item .w{font:400 11px var(--code);color:var(--fainter);flex-shrink:0}

  /* ---- composer ---- */
  .composer{padding:12px 18px 16px;flex-shrink:0}
  .composer.home{border-top:none;padding-top:6px}
  .composer.chat{border-top:1px solid var(--line)}
  .attach-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:11px}
  .attach-row:empty{display:none}
  .attach-chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:5px 8px 5px 10px}
  .attach-chip .nm{font:400 12px var(--ui);color:var(--text2);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .attach-chip.uploading{opacity:.6}
  .attach-chip.error{border-color:var(--danger);color:var(--danger)}
  .chip-x{cursor:pointer;display:flex;color:var(--faint)}
  .chip-spin{width:12px;height:12px;border:2px solid var(--faint);border-top-color:transparent;border-radius:50%}
  .comp-line{display:flex;align-items:center;gap:8px}
  .comp-line.home{border-top:1px solid var(--line);padding-top:12px}
  #input{flex:1;min-width:0;border:none;outline:none;background:none;resize:none;font:400 15px var(--ui);color:var(--ink);max-height:120px;line-height:1.5;padding:2px 0}
  .model-slot{position:relative;flex-shrink:0}
  .model-btn{display:inline-flex;align-items:center;gap:3px;border:1px solid var(--line-strong);background:var(--card);border-radius:9999px;padding:5px 11px;font:500 12px var(--ui);color:var(--text2);cursor:pointer;white-space:nowrap}
  .model-pop{position:absolute;right:0;bottom:calc(100% + 6px);background:var(--card);border:1px solid var(--line-strong);border-radius:10px;padding:4px;min-width:150px;box-shadow:0 10px 30px rgba(31,30,29,.16);z-index:20}
  .model-opt{padding:9px 12px;border-radius:7px;font:400 13.5px var(--ui);color:var(--dim);cursor:pointer}
  .model-opt.sel{background:var(--accent-bg);color:var(--accent-press);font-weight:500}
  .model-opt.custom{border-top:1px solid var(--line-soft);margin-top:2px;color:var(--faint)}
  .send{width:38px;height:38px;flex-shrink:0;border-radius:50%;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .send.stop{background:var(--surface);color:var(--text2);border:1px solid var(--line-strong)}
  .send:disabled{background:var(--surface);color:var(--hint);cursor:default}

  /* ---- chat ---- */
  .msgs{flex:1;overflow:auto;padding:16px 20px 6px;display:flex;flex-direction:column;gap:20px;min-height:0}
  .time-div{align-self:center;font:400 11px var(--ui);color:var(--fainter)}
  .row{display:flex;flex-direction:column;gap:6px}
  .row.user{align-items:flex-end}
  .row.assistant{align-items:flex-start;gap:10px}
  .bubble-user{max-width:82%;background:var(--accent-bg);border-radius:16px 16px 4px 16px;padding:10px 14px;font:400 14.5px/1.6 var(--ui);color:var(--ink);white-space:pre-wrap;word-break:break-word}
  .u-att{display:inline-flex;align-items:center;gap:5px;background:var(--surface);border-radius:8px;padding:3px 8px;font:400 11px var(--ui);color:var(--icon)}
  .a-head{display:flex;align-items:center;gap:7px}
  .a-head .nm{font:600 11px var(--ui);letter-spacing:.06em;color:var(--icon);text-transform:uppercase}
  .think-pill{align-self:flex-start;display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:9999px;padding:5px 12px;cursor:pointer}
  .think-pill .lb{font:500 11px var(--ui);letter-spacing:.05em;color:var(--icon);text-transform:uppercase}
  .think-pill .ca{font:600 10px var(--code);color:var(--faint)}
  .think-body{align-self:stretch;border-left:2px solid rgba(217,119,87,.3);padding-left:14px;font:400 13px/1.75 var(--ui);color:var(--faint);white-space:pre-wrap}
  .think-tool{font:400 12px/1.7 var(--code);color:var(--dim)}
  .think-tool b{color:var(--accent-press);font-weight:600}
  .a-text{font:400 16.5px/1.9 var(--ui);color:var(--ink);white-space:pre-wrap;word-break:break-word}
  .a-usage{display:flex;gap:8px;font:400 11px var(--code);color:var(--fainter)}
  .a-tools{display:flex;align-items:center;gap:2px;margin-top:2px}
  .a-tool{border:none;background:none;padding:7px;color:var(--faint);cursor:pointer;display:flex}
  .a-tool:active{color:var(--accent-press)}
  .typing{align-self:flex-start;display:flex;align-items:center;gap:7px}
  .typing .lb{font:400 14px var(--ui);color:var(--faint);font-style:italic}
  .typing .d{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px 0;color:var(--fainter)}
  .msg-sys{align-self:center;max-width:88%;font:400 13px/1.6 var(--ui);color:var(--danger-text);white-space:pre-wrap;text-align:center}

  /* ---- sidebar ---- */
  .overlay{position:absolute;inset:0;background:rgba(20,20,19,.32);z-index:90;opacity:0;pointer-events:none;transition:opacity .2s}
  .overlay.open{opacity:1;pointer-events:auto}
  .drawer{position:absolute;left:0;top:0;bottom:0;width:300px;max-width:86%;background:var(--bg);z-index:100;transform:translateX(-100%);
          transition:transform .24s ease;display:flex;flex-direction:column;border-right:1px solid var(--line)}
  .drawer.open{transform:none}
  .dh{display:flex;align-items:center;gap:10px;padding:16px;border-bottom:1px solid var(--line)}
  .dh .t{flex:1;font:400 16px var(--ui);color:var(--text)}
  .newchat{display:inline-flex;align-items:center;gap:6px;background:var(--accent-bg);color:var(--accent-press);border:1px solid var(--accent-bd);border-radius:10px;padding:7px 12px;font:400 13px var(--ui);cursor:pointer}
  .dnav{padding:8px 8px 6px;display:flex;flex-direction:column;gap:2px;flex-shrink:0}
  .navitem{display:flex;align-items:center;gap:11px;border:none;background:none;text-align:left;padding:10px 12px;border-radius:9px;color:var(--text2);font:400 14px var(--ui);cursor:pointer}
  .navitem svg{opacity:.75;color:var(--icon)}
  .navitem:active{background:var(--surface)}
  .dsep{height:1px;background:var(--line);margin:4px 12px;flex-shrink:0}
  .dsearch{padding:8px 12px 4px}
  .dsearch input{width:100%;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 11px;font:400 13.5px var(--ui);color:var(--ink);outline:none}
  .slist{flex:1;overflow:auto;padding:2px 8px;min-height:0}
  .sgroup{font:600 10px var(--ui);letter-spacing:.08em;color:var(--fainter);text-transform:uppercase;padding:10px 12px 4px}
  .sitem{padding:9px 12px;border-radius:9px;cursor:pointer}
  .sitem.active,.sitem:active{background:var(--surface)}
  .sitem .t{font:400 14px var(--ui);color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sitem .m{font:400 12px var(--code);color:var(--fainter);margin-top:2px}
  .dfoot{padding:12px 16px;border-top:1px solid var(--line);font:400 11px var(--code);letter-spacing:.04em;color:var(--fainter);flex-shrink:0}

  /* ---- permission sheet ---- */
  .sheet-ov{position:absolute;inset:0;background:rgba(20,20,19,.4);z-index:130;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
  .sheet-ov.open{opacity:1;pointer-events:auto}
  .sheet{width:100%;max-width:520px;background:var(--card);border-radius:22px 22px 0 0;padding:16px 20px calc(22px + var(--safe-bottom));transform:translateY(12px);transition:transform .2s}
  .sheet-ov.open .sheet{transform:none}
  .grab{width:38px;height:4px;border-radius:9999px;background:#E4E1D8;margin:0 auto 20px}
  .perm-hd{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .perm-ic{width:44px;height:44px;border-radius:12px;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .perm-tt{font:600 16px var(--ui);color:var(--text)}
  .perm-sub{font:400 12.5px var(--ui);color:var(--faint);margin-top:2px}
  .perm-params{background:var(--bg);border:1px solid rgba(31,30,29,.09);border-radius:12px;padding:12px 14px;font:400 12px/1.6 var(--code);color:var(--text2);white-space:pre-wrap;word-break:break-word;max-height:150px;overflow:auto}
  .perm-note{font:400 12px/1.55 var(--ui);color:var(--fainter);margin:12px 2px 18px}
  .perm-note b{color:var(--dim);font-weight:500}
  .perm-btns{display:flex;flex-direction:column;gap:9px}
  .btn-primary{width:100%;border:none;background:var(--accent-press);color:#fff;border-radius:12px;padding:13px;font:600 14.5px var(--ui);cursor:pointer}
  .perm-row2{display:flex;gap:9px}
  .btn-ghost{flex:1;border:1px solid var(--line-strong);background:var(--card);color:var(--text2);border-radius:12px;padding:12px;font:500 14px var(--ui);cursor:pointer}
  .btn-deny{flex:1;border:1px solid rgba(181,51,51,.28);background:var(--card);color:var(--danger-text);border-radius:12px;padding:12px;font:500 14px var(--ui);cursor:pointer}

  /* ---- toast ---- */
  .toast{position:absolute;left:50%;bottom:calc(84px + var(--safe-bottom));transform:translateX(-50%) translateY(6px);background:var(--ink);color:#FAF9F5;font:400 13px var(--ui);padding:9px 16px;border-radius:9999px;z-index:200;max-width:82%;text-align:center;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
  .toast.show{opacity:1;transform:translateX(-50%)}

  /* ---- subpage shared ---- */
  .ph-body{flex:1;display:flex;align-items:center;justify-content:center;color:var(--fainter);font:400 14px var(--ui);padding:40px}
  .sub-top{padding:14px 20px 0;flex-shrink:0}
  .sub-top .r{display:flex;align-items:center;gap:8px}
  .sub-h{font:600 21px var(--ui);color:var(--text)}
  .sub-meta{margin-left:auto;font:400 12.5px var(--ui);color:var(--faint);white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
  .sub-body{flex:1;overflow:auto;min-height:0}
  .sub-empty{text-align:center;color:var(--fainter);font:400 14px/1.9 var(--ui);padding:44px 24px}
  /* memory */
  .mem-search{padding:14px 20px 10px;flex-shrink:0}
  .mem-search .box{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line-strong);border-radius:11px;padding:10px 13px}
  .mem-search input{flex:1;border:none;outline:none;background:none;font:400 14px var(--ui);color:var(--ink)}
  .mem-tags{display:flex;gap:8px;padding:0 20px 4px;overflow-x:auto;flex-shrink:0}
  .tag-chip{flex-shrink:0;white-space:nowrap;border-radius:9999px;padding:6px 14px;font:400 12.5px var(--ui);cursor:pointer;background:var(--card);border:1px solid var(--line-strong);color:var(--text2)}
  .tag-chip.on{background:var(--accent-press);border-color:var(--accent-press);color:#fff;font-weight:500}
  .mem-list{padding:14px 20px 16px;display:flex;flex-direction:column;gap:11px}
  .mem-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 15px}
  .mem-card .tx{font:400 15px/1.72 var(--ui);color:var(--ink)}
  .mem-card .ft{display:flex;align-items:center;gap:8px;margin-top:11px}
  .mem-tag{border-radius:6px;padding:2px 8px;font:500 11px var(--ui)}
  .mem-date{font:400 11px var(--code);color:var(--fainter)}
  .mem-del{margin-left:auto;border:none;background:none;padding:2px;color:#D6D3C9;cursor:pointer;display:flex}
  /* status */
  .st-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;padding:18px 20px 0}
  .st-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px}
  .st-card.dim{opacity:.5}
  .st-card .lb{display:flex;align-items:center;gap:7px;font:500 12px var(--ui);color:var(--dim)}
  .st-card .vl{font:500 18px var(--ui);color:var(--text);margin-top:11px}
  .st-card .sb{font:400 11px var(--code);color:var(--faint);margin-top:4px}
  .st-sec{font:600 11px var(--ui);letter-spacing:.07em;color:var(--fainter);text-transform:uppercase;margin:24px 22px 12px}
  .st-box{margin:0 20px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
  .st-box.rows{padding:0;overflow:hidden}
  .quota+.quota{margin-top:18px}
  .quota .qh{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .quota .qh .k{font:400 13px var(--ui);color:var(--text2)}
  .quota .qh .p{font:500 13px var(--code);color:var(--dim)}
  .qbar{height:6px;border-radius:3px;background:var(--track);overflow:hidden}
  .qbar>div{height:100%;border-radius:3px}
  .quota .rs{font:400 10.5px var(--code);color:var(--faint);margin-top:6px}
  .tool-row{display:flex;align-items:center;gap:11px;padding:13px 15px;border-bottom:1px solid var(--line-soft)}
  .tool-row:last-child{border-bottom:none}
  .tool-row .nm{flex:1;font:400 14px var(--ui);color:var(--ink)}
  .pill-tag{font:500 11px var(--ui);border-radius:6px;padding:2px 8px}
  /* settings */
  .set-body{padding:12px 20px 24px}
  .set-field{margin-bottom:20px}
  .set-field .lb{font:400 12px var(--ui);color:var(--faint);margin-bottom:8px}
  .set-input{width:100%;background:var(--card);border:1px solid var(--line-strong);border-radius:10px;padding:11px 13px;font:400 15px var(--ui);color:var(--ink);outline:none}
  .set-sec{font:600 11px var(--ui);letter-spacing:.07em;color:var(--fainter);text-transform:uppercase;margin:0 2px 10px}
  .set-group{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;position:relative;margin-bottom:22px}
  .set-row{display:flex;align-items:center;padding:13px 15px;border-bottom:1px solid var(--line-soft)}
  .set-row:last-child{border-bottom:none}
  .set-row .k{flex:1;font:400 14.5px var(--ui);color:var(--ink)}
  .set-row .v{font:400 13px var(--ui);color:var(--faint);margin-right:10px}
  .set-row.tap{cursor:pointer}
  .set-row .danger{color:var(--danger-text)}
  .tog{width:44px;height:26px;border-radius:9999px;background:#E4E1D8;border:none;position:relative;cursor:pointer;flex-shrink:0;transition:background .18s;padding:0}
  .tog::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .18s;box-shadow:0 1px 3px rgba(20,20,19,.2)}
  .tog.on{background:var(--accent)}
  .tog.on::after{transform:translateX(18px)}
  .set-menu{position:absolute;right:14px;background:var(--card);border:1px solid var(--line-strong);border-radius:10px;padding:4px;min-width:180px;box-shadow:0 10px 30px rgba(31,30,29,.16);z-index:20}
  .set-menu .mi{padding:9px 12px;border-radius:7px;font:400 13.5px var(--ui);color:var(--dim);cursor:pointer}
  .set-menu .mi.sel{background:var(--accent-bg);color:var(--accent-press);font-weight:500}
  .set-ver{font:400 11.5px var(--ui);color:var(--fainter);text-align:center;margin:22px 0 0}
  @media (prefers-reduced-motion:reduce){.tog,.tog::after{transition:none}}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- ============ HOME ============ -->
  <div class="view active" id="v-home">
    <div class="top">
      <button class="icon-btn lead" onclick="openSidebar()" aria-label="菜单">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"></path></svg></button>

        <div><div class="perm-tt">允许执行 <span id="perm-tool">工具</span>?</div><div class="perm-sub">Claude 请求调用工具</div></div>

<script>
const $ = id => document.getElementById(id);
const escHtml = s => (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
// Pando 根/立交桥标记(clay),原型同款
const PANDO_LOGO = size => `<svg width="${size}" height="${size}" viewBox="0 0 92 91" fill="none"><line x1="75.89" y1="45.4" x2="15.89" y2="45.39" stroke="#D97757" stroke-width="8"></line><line y1="-3.5" x2="24" y2="-3.5" transform="matrix(-4.37114e-08 -1 -1 4.37114e-08 42 78)" stroke="#D97757" stroke-width="7"></line><path d="M44.9746 90.7773C42.9926 86.3882 41.8887 81.5175 41.8887 76.3887C41.8887 74.0134 42.1272 71.6937 42.5781 69.4512C49.3588 58.2688 58.7688 48.8588 69.9512 42.0781C72.1937 41.6272 74.5134 41.3887 76.8887 41.3887C82.0175 41.3887 86.8882 42.4926 91.2773 44.4746C69.1937 51.269 51.769 68.6937 44.9746 90.7773Z" fill="#D97757"></path><line y1="-3.5" x2="24" y2="-3.5" transform="matrix(4.37114e-08 1 1 -4.37114e-08 49.2773 12.7773)" stroke="#D97757" stroke-width="7"></line><path d="M46.3027 0C48.2847 4.38913 49.3887 9.25989 49.3887 14.3887C49.3887 16.764 49.1502 19.0837 48.6992 21.3262C41.9186 32.5086 32.5086 41.9186 21.3262 48.6992C19.0837 49.1502 16.764 49.3887 14.3887 49.3887C9.25989 49.3887 4.38913 48.2847 0 46.3027C22.0837 39.5084 39.5084 22.0837 46.3027 0Z" fill="#D97757"></path></svg>`;
const IC = {
  attach:'<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M20 11.5l-7.8 7.8a4 4 0 0 1-5.7-5.7l8-8a2.7 2.7 0 0 1 3.8 3.8l-8 8a1.3 1.3 0 0 1-1.9-1.9l7.2-7.2"></path></svg>',
  send:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V6M6 12l6-6 6 6"></path></svg>',
  stop:'<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"></rect></svg>',
  copy:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="9" y="9" width="11" height="11" rx="2"></rect><path d="M5 15V6a2 2 0 0 1 2-2h9"></path></svg>',
  read:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 L6 9 H3 v6 h3 l5 4 z"></path><path d="M16 9a4 4 0 0 1 0 6"></path><path d="M19 7a7 7 0 0 1 0 10"></path></svg>',
  x:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"></path></svg>',
  clip:'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M20 11.5l-7.8 7.8a4 4 0 0 1-5.7-5.7l8-8a2.7 2.7 0 0 1 3.8 3.8l-8 8a1.3 1.3 0 0 1-1.9-1.9l7.2-7.2"></path></svg>',
};

/* ===== state ===== */
let ws, busy=false, currentAssistantRow=null, assistantText='', roundTools=[];
let currentSessionId = localStorage.getItem('currentSessionId') || null;
let currentModel = localStorage.getItem('defaultModel') || '';
let allSessions = [], typingEl=null, lastMsgTime=null, view='home';
let ASST='Claude';
const MODELS = [['','默认'],['claude-fable-5','Fable 5'],['claude-opus-4-8','Opus 4.8'],['claude-sonnet-5','Sonnet 5'],['claude-haiku-4-5-20251001','Haiku 4.5']];
const modelLabel = id => (MODELS.find(m=>m[0]===id)||['',id])[1] || id;

/* ===== attachments ===== */
const ATT_ALLOWED_EXT=['png','jpg','jpeg','gif','webp','pdf','txt','md','csv','json','log','py','js','ts','html','css','sh'];
const ATT_MAX_BYTES=10*1024*1024;
let pendingAtts=[], attSeq=0;
const extOf = n => (n.split('.').pop()||'').toLowerCase();
function onFilesSelected(e){ const files=Array.from(e.target.files||[]); e.target.value=''; files.forEach(uploadAttachment); }
async function uploadAttachment(file){
  if(!ATT_ALLOWED_EXT.includes(extOf(file.name))){ toast(file.name+' 类型不支持'); return; }
  if(file.size>ATT_MAX_BYTES){ toast(file.name+' 超过 10MB'); return; }
  const att={id:++attSeq,name:file.name,path:null,uploading:true,error:false};
  pendingAtts.push(att); renderChips();
  try{
    const fd=new FormData(); fd.append('file',file);
    const r=await fetch('/attachments',{method:'POST',body:fd});
    if(!r.ok) throw new Error('http '+r.status);
    att.path=(await r.json()).path; att.uploading=false;
  }catch(err){ console.error('attach upload failed',err); att.uploading=false; att.error=true; toast(file.name+' 上传失败'); setTimeout(()=>removeAttachment(att.id),1800); }
  renderChips();
}
function removeAttachment(id){ pendingAtts=pendingAtts.filter(a=>a.id!==id); renderChips(); }
function clearAttachments(){ pendingAtts=[]; renderChips(); }
function renderChips(){
  [$('attach-home'),$('attach-chat')].forEach(box=>{
    box.innerHTML='';
    pendingAtts.forEach(a=>{
      const chip=document.createElement('div');
      chip.className='attach-chip'+(a.uploading?' uploading':'')+(a.error?' error':'');
      chip.innerHTML=(a.uploading?'<span class="chip-spin spin"></span>':IC.clip)+`<span class="nm">${escHtml(a.name)}</span>`;
      if(!a.uploading){ const x=document.createElement('span'); x.className='chip-x'; x.innerHTML=IC.x; x.onclick=()=>removeAttachment(a.id); chip.appendChild(x); }
      box.appendChild(chip);
    });
  });
}

/* ===== composer (shared, rendered into both home & chat) ===== */
function composerHTML(){
  return `<button class="icon-btn lead" onclick="$('file-input').click()" aria-label="附件">${IC.attach}</button>`+
    `<textarea id="input" rows="1" placeholder="写点什么…" onkeydown="onInputKey(event)"></textarea>`+
    `<span class="model-slot"><button class="model-btn" id="model-btn" onclick="toggleModel(event)">${escHtml(modelLabel(currentModel))} ▾</button>`+
    `<div class="model-pop" id="model-pop" style="display:none"></div></span>`+
    `<button class="send" id="send-btn" onclick="onSendBtn()" aria-label="发送">${IC.send}</button>`;
}
let $input=null;
function mountComposers(){
  document.querySelectorAll('[data-composer]').forEach(el=>{ el.innerHTML=composerHTML(); });
  // 两个 composer 共享同一 id 会重复;改为只在当前视图的 composer 上取 #input
  syncComposerRefs();
}
function activeComposer(){ return view==='chat' ? $('v-chat') : $('v-home'); }
function syncComposerRefs(){
  const host = activeComposer();
  $input = host.querySelector('#input');
  renderModelPop();
}
function renderModelPop(){
  const host = activeComposer(); const pop = host.querySelector('#model-pop'); if(!pop) return;
  pop.innerHTML = MODELS.map(([id,nm])=>`<div class="model-opt${id===currentModel?' sel':''}" onclick="selectModel('${id}')">${nm}</div>`).join('')
    + `<div class="model-opt custom" onclick="selectCustomModel()">自定义…</div>`;
}
function toggleModel(e){ e.stopPropagation(); const host=activeComposer(); const p=host.querySelector('#model-pop'); p.style.display = p.style.display==='none'?'block':'none'; }
function selectModel(id){ applyModel(id); const host=activeComposer(); host.querySelector('#model-pop').style.display='none'; }
function selectCustomModel(){ const host=activeComposer(); host.querySelector('#model-pop').style.display='none'; const id=(prompt('输入模型 id(经 CLI --model 透传):',currentModel)||'').trim(); if(id) applyModel(id); }
function applyModel(id){
  currentModel=id||'';
  if(currentModel) localStorage.setItem('defaultModel',currentModel); else localStorage.removeItem('defaultModel');
  document.querySelectorAll('#model-btn').forEach(b=>b.textContent=modelLabel(currentModel)+' ▾');
  document.querySelectorAll('.model-pop').forEach(pop=>{ /* refresh sel on next open */ });
  renderModelPop();
}
document.addEventListener('click',e=>{ if(!e.target.closest('.model-slot')) document.querySelectorAll('.model-pop').forEach(p=>p.style.display='none'); });

let enterToSend = localStorage.getItem('enterToSend')!=='0';
function onInputKey(e){ if(e.key!=='Enter') return; const s = enterToSend?!e.shiftKey:(e.metaKey||e.ctrlKey); if(s){ e.preventDefault(); send(); } }

/* ===== view routing ===== */
function go(v){
  view=v; closeSidebar();
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  $('v-'+v).classList.add('active');
  if(v==='home'||v==='chat') syncComposerRefs();
  if(v==='memory') loadMemory();
  if(v==='status') loadStatus();
  if(v==='settings') loadSettings();
}
const BACK='<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"></path></svg>';
const TRASH='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13"></path></svg>';
const SEARCHIC='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8B8A83" stroke-width="1.7" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><path d="M20 20l-3.2-3.2"></path></svg>';
const CHEV='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#C2C0B6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"></path></svg>';
const TAG_COLORS={ '项目':['#2360A8','rgba(44,132,219,.1)'], '偏好':['#B15A32','rgba(217,119,87,.12)'], '生活':['#436426','rgba(67,116,38,.12)'], '阅读':['#6B52A8','rgba(120,90,180,.12)'] };

/* ===== MEMORY ===== */
let memActiveTag='全部', memStatsCache=null;
async function loadMemory(){
  const v=$('v-memory');
  v.innerHTML=`<div class="sub-top"><div class="r"><button class="icon-btn lead" onclick="go('home')">${BACK}</button><span class="sub-h">记忆</span><span class="sub-meta" id="mem-count"></span></div></div>
    <div class="mem-search"><div class="box">${SEARCHIC}<input id="mem-q" placeholder="搜索记忆…" oninput="renderMemories()" autocomplete="off"></div></div>
    <div class="sub-body pd-scroll"><div class="mem-list" id="mem-list"></div></div>`;
  try{ const r=await fetch('/memory-admin/memory/stats'); if(r.ok){ memStatsCache=await r.json();
    $('mem-count').textContent=`${memStatsCache.count??0} 条 · ${fmtChars(memStatsCache.chars)}`; } }catch(e){}
  renderMemories();
}
function fmtChars(n){ if(!n) return '0 字'; return n>=1000?`${(n/1000).toFixed(1)}k 字`:`${n} 字`; }
function setMemTag(t){ memActiveTag=t; document.querySelectorAll('#mem-tags .tag-chip').forEach(c=>c.classList.toggle('on',c.textContent===t)); renderMemories(); }
async function renderMemories(){
  const list=$('mem-list'); if(!list) return;
  const q=($('mem-q')?.value||'').trim();
  let items=null;
  try{ const url=q?`/memory-admin/memory/search?q=${encodeURIComponent(q)}`:'/memory-admin/memory/list';
    const r=await fetch(url); if(r.ok) items=await r.json(); else if(r.status===404) items='unconfigured'; }catch(e){ items='unconfigured'; }
  if(items==='unconfigured'){ list.innerHTML=`<div class="sub-empty">未配置记忆服务<br><span style="font-size:12px;color:var(--hint)">在宿主机指向 MEMORY_SERVICE_URL 后即可在此浏览记忆</span></div>`; return; }
  items=Array.isArray(items)?items:[];
  if(!items.length){ list.innerHTML=`<div class="sub-empty">${q?'没有匹配的记忆':'还没有记忆'}</div>`; return; }
  // 开源服记忆无打标 → 只显示正文 + 时间;标签/筛选留给生产服
  list.innerHTML=items.map(m=>{
    const text=escHtml(m.text||m.content||m.body||''); const date=fmtWhen(m.created_at||m.updated_at||m.date);
    return `<div class="mem-card"><div class="tx">${text}</div><div class="ft"><span class="mem-date">${date}</span><button class="mem-del" onclick="deleteMemory('${m.id}')">${TRASH}</button></div></div>`;
  }).join('');
}
async function deleteMemory(id){ try{ const r=await fetch(`/memory-admin/memory/${id}`,{method:'DELETE'}); if(r.ok){ toast('已删除记忆'); loadMemory(); } }catch(e){} }

/* ===== STATUS ===== */
async function loadStatus(){
  const v=$('v-status');
  let health=null,quota=null,memst=null;
  try{ const r=await fetch('/health'); if(r.ok) health=await r.json(); }catch(e){}
  try{ const r=await fetch('/usage/quota'); if(r.ok) quota=await r.json(); }catch(e){}
  try{ const r=await fetch('/memory-admin/memory/stats'); if(r.ok) memst=await r.json(); }catch(e){}
  const online=!!(health&&health.claude_ok);
  const dot=`<span style="width:6px;height:6px;border-radius:50%;background:${online?'var(--online)':'var(--danger)'}"></span>`;
  const card=(lb,vl,sb,dim)=>`<div class="st-card${dim?' dim':''}"><div class="lb">${lb}</div><div class="vl">${vl}</div><div class="sb">${sb}</div></div>`;
  const quotaBar=(k,pct,reset)=>{ const c=pct<60?'var(--online)':(pct<85?'var(--warn)':'var(--danger)');
    return `<div class="quota"><div class="qh"><span class="k">${k}</span><span class="p">${pct}%</span></div><div class="qbar"><div style="width:${pct}%;background:${c}"></div></div><div class="rs">${reset||''}</div></div>`; };
  let usageHtml='';
  if(quota&&(quota.five_hour||quota.weekly||quota.session)){
    const a=quota.five_hour||quota.session||{}, b=quota.weekly||{};
    usageHtml=`<div class="st-sec">用量</div><div class="st-box">${quotaBar('5 小时窗',Math.round((a.used_pct??a.pct??0)),a.resets_at||a.reset||'')}${quotaBar('周限额',Math.round((b.used_pct??b.pct??0)),b.resets_at||b.reset||'')}</div>`;
  } else {
    usageHtml=`<div class="st-sec">用量</div><div class="st-box"><div class="sub-empty" style="padding:8px">需登录本地 Claude 订阅后显示额度</div></div>`;
  }
  v.innerHTML=`<div class="sub-top"><div class="r"><button class="icon-btn lead" onclick="go('home')">${BACK}</button><span class="sub-h">状态</span><span class="sub-meta">${dot}${online?'刚刚同步':'离线'}</span></div></div>
    <div class="sub-body pd-scroll">
      <div class="st-grid">
        ${card(dot+'连接',online?'在线':'离线',online?'CLI 已就绪':'CLI 未就绪')}
        ${card('记忆',memst?`${memst.count??0} 条`:'—',memst?fmtChars(memst.chars):'未配置')}
        ${card('模型','Claude',currentModel?modelLabel(currentModel):'默认')}
        ${card('情感','未装配','—',true)}
      </div>
      ${usageHtml}
      <div class="st-sec">已连接工具</div>
      <div class="st-box rows">
        <div class="tool-row"><span class="nm">本地文件</span><span class="pill-tag" style="color:var(--online);background:rgba(91,154,91,.12)">已授权</span></div>
        <div class="tool-row"><span class="nm">终端 / Shell</span><span class="pill-tag" style="color:var(--danger-text);background:rgba(217,119,87,.12)">每次询问</span></div>
        <div class="tool-row"><span class="nm">网络访问</span><span class="pill-tag" style="color:var(--faint);background:var(--track)">已关闭</span></div>
      </div>
      <div style="height:20px"></div>
    </div>`;
}

/* ===== SETTINGS ===== */
function loadSettings(){
  const v=$('v-settings');
  const nick=localStorage.getItem('userNickname')||''; const asst=localStorage.getItem('assistantName')||'';
  const autoMem=localStorage.getItem('autoMemory')!=='0'; const localFile=localStorage.getItem('permLocalFile')!=='0';
  const themeLabel=localStorage.getItem('theme')==='_smoke'?'简洁·烟':'简洁';
  v.innerHTML=`<div class="sub-top"><div class="r"><button class="icon-btn lead" onclick="go('home')">${BACK}</button><span class="sub-h">设置</span></div></div>
    <div class="sub-body pd-scroll set-body">
      <div class="set-field"><div class="lb">你的昵称</div><input class="set-input" id="s-nick" value="${escHtml(nick)}" oninput="saveIdentity()" autocomplete="off"></div>
      <div class="set-field"><div class="lb">助手名称</div><input class="set-input" id="s-asst" value="${escHtml(asst)}" placeholder="Claude" oninput="saveIdentity()" autocomplete="off"></div>
      <div class="set-sec">通用</div>
      <div class="set-group">
        <div class="set-row tap" onclick="toggleThemeMenu(event)"><span class="k">主题</span><span class="v" id="s-theme">${themeLabel}</span>${CHEV}
          <div class="set-menu" id="theme-menu" style="display:none;top:44px">
            <div class="mi${localStorage.getItem('theme')!=='_smoke'?' sel':''}" onclick="pickTheme('')">简洁</div>
            <div class="mi${localStorage.getItem('theme')==='_smoke'?' sel':''}" onclick="pickTheme('_smoke')">简洁·烟</div>
          </div>
        </div>
        <div class="set-row"><span class="k">回车即发送</span><button class="tog${enterToSend?' on':''}" id="s-enter" onclick="toggleEnter()"></button></div>
      </div>
      <div class="set-sec">模型与记忆</div>
      <div class="set-group">
        <div class="set-row tap" onclick="cycleDefaultModel()"><span class="k">默认模型</span><span class="v" id="s-model">${currentModel?modelLabel(currentModel):'默认'}</span>${CHEV}</div>
        <div class="set-row"><span class="k">自动记住上下文</span><button class="tog${autoMem?' on':''}" id="s-automem" onclick="toggleAutoMem()"></button></div>
      </div>
      <div class="set-sec">工具权限</div>
      <div class="set-group">
        <div class="set-row"><span class="k">本地文件访问</span><button class="tog${localFile?' on':''}" id="s-local" onclick="toggleLocalFile()"></button></div>
        <div class="set-row tap" onclick="clearPerms()"><span class="k danger">清除全部授权</span>${CHEV}</div>
      </div>
      <div class="set-ver" id="s-ver">Pando</div>
    </div>`;
  fetch('/health').then(r=>r.ok?r.json():null).then(h=>{ if(h&&h.version&&$('s-ver')) $('s-ver').textContent='Pando v'+h.version+' · 基于 Claude Code'; }).catch(()=>{});
}
function saveIdentity(){ const nick=$('s-nick').value.trim(), asst=$('s-asst').value.trim();
  if(nick) localStorage.setItem('userNickname',nick); else localStorage.removeItem('userNickname');
  if(asst) localStorage.setItem('assistantName',asst); else localStorage.removeItem('assistantName');
  ASST=asst||'Claude'; ['home-asst','chat-asst'].forEach(id=>$(id).textContent=ASST);
  $('hero-name').textContent=nick?`${nick},你好`:'你好'; }
function toggleEnter(){ enterToSend=!enterToSend; if(enterToSend) localStorage.removeItem('enterToSend'); else localStorage.setItem('enterToSend','0'); $('s-enter').classList.toggle('on',enterToSend); }
function toggleAutoMem(){ const on=localStorage.getItem('autoMemory')!=='0'; if(on) localStorage.setItem('autoMemory','0'); else localStorage.removeItem('autoMemory'); $('s-automem').classList.toggle('on',!on); }
function toggleLocalFile(){ const on=localStorage.getItem('permLocalFile')!=='0'; if(on) localStorage.setItem('permLocalFile','0'); else localStorage.removeItem('permLocalFile'); $('s-local').classList.toggle('on',!on); }
function toggleThemeMenu(e){ e.stopPropagation(); const m=$('theme-menu'); m.style.display=m.style.display==='none'?'block':'none'; }
function pickTheme(t){ if(t) localStorage.setItem('theme',t); else localStorage.removeItem('theme'); $('theme-menu').style.display='none'; $('s-theme').textContent=t==='_smoke'?'简洁·烟':'简洁'; toast('主题已切换(需刷新生效)'); }
function cycleDefaultModel(){ const ids=MODELS.map(m=>m[0]); const i=ids.indexOf(currentModel); const next=ids[(i+1)%ids.length]; applyModel(next); $('s-model').textContent=next?modelLabel(next):'默认'; }
function clearPerms(){ localStorage.removeItem('permLocalFile'); toast('已清除本地授权记录'); }
function openSidebar(){ loadSessions(); $('overlay').classList.add('open'); $('drawer').classList.add('open'); }
function closeSidebar(){ $('overlay').classList.remove('open'); $('drawer').classList.remove('open'); }

/* ===== sessions ===== */
async function loadSessions(){ try{ allSessions=await (await fetch('/sessions?limit=30')).json(); renderSessions(); }catch(e){ console.error('loadSessions',e); } renderRecent(); }
function sessBucket(ts){ if(!ts) return '更早'; const now=new Date(); const t0=new Date(ts).getTime();
  const start=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime(); const day=864e5;
  if(t0>=start) return '今天'; if(t0>=start-day) return '昨天'; if(t0>=start-6*day) return '本周内'; return '更早'; }
function fmtWhen(ts){ if(!ts) return ''; return new Date(ts).toLocaleDateString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
function renderSessions(){
  const list=$('side-list'); if(!list) return; list.innerHTML='';
  const q=($('side-search').value||'').trim().toLowerCase();
  const items=allSessions.filter(s=>!q||(s.title||'').toLowerCase().includes(q));
  if(!items.length){ const e=document.createElement('div'); e.className='ph-body'; e.style.padding='30px'; e.textContent=q?'没有匹配的对话':'还没有对话'; list.appendChild(e); return; }
  const groups={}; items.forEach(s=>{ const b=sessBucket(s.updated_at); (groups[b]=groups[b]||[]).push(s); });
  ['今天','昨天','本周内','更早'].forEach(b=>{ if(!groups[b]) return;
    const h=document.createElement('div'); h.className='sgroup'; h.textContent=b; list.appendChild(h);
    groups[b].forEach(s=>{
      const el=document.createElement('div'); el.className='sitem'+(s.id===currentSessionId?' active':'');
      el.innerHTML=`<div class="t">${escHtml(s.title||'新对话')}</div><div class="m">${s.msg_count||0} 条 · ${fmtWhen(s.updated_at)}</div>`;
      el.onclick=()=>switchSession(s.id); list.appendChild(el);
    });
  });
}
function renderRecent(){
  const box=$('recent-list'); box.innerHTML='';
  allSessions.slice(0,3).forEach(s=>{
    const el=document.createElement('div'); el.className='recent-item';
    el.innerHTML=`<span class="t">${escHtml(s.title||'新对话')}</span><span class="w">${fmtWhen(s.updated_at)}</span>`;
    el.onclick=()=>switchSession(s.id); box.appendChild(el);
  });
}
async function switchSession(sid){ go('chat'); $('msgs').innerHTML=''; setSessionId(sid); await loadHistory(sid); if(ws&&ws.readyState===1) ws.send(JSON.stringify({switch_session:sid})); }
function newChat(){ setSessionId(null); currentAssistantRow=null; assistantText=''; roundTools=[]; $('msgs').innerHTML=''; go('home'); loadSessions(); if(ws&&ws.readyState===1) ws.send(JSON.stringify({switch_session:null})); }
function setSessionId(id){ currentSessionId=id; if(id) localStorage.setItem('currentSessionId',id); else localStorage.removeItem('currentSessionId'); }

function showEmpty(){ const m=$('msgs'); if(m.children.length) return; const e=document.createElement('div'); e.className='empty';
  e.innerHTML=`<div style="opacity:.5">${PANDO_LOGO(34)}</div><span style="font:400 14px var(--ui)">新对话 · 说点什么开始</span>`; m.appendChild(e); }
function clearEmpty(){ const e=$('msgs').querySelector('.empty'); if(e) e.remove(); }

async function loadHistory(sid){
  const m=$('msgs'); m.innerHTML='';
  try{
    const msgs=await (await fetch(`/sessions/${sid}/messages`)).json();
    if(!msgs.length){ showEmpty(); return; }
    msgs.forEach(x=>{
      if(x.role==='user') addUser(x.content, (x.metadata&&x.metadata.attachments)||[]);
      else if(x.role==='assistant'){ const row=addAssistant(x.content); if(x.metadata&&x.metadata.thinking) addThinking(row, x.metadata.thinking, null); addToolbar(row,x.content);
        if(x.metadata&&x.metadata.usage) addUsage(row,x.metadata); }
    });
  }catch(e){ console.error(e); }
}

/* ===== message rendering (原型样式) ===== */
function ensureChat(){ if(view!=='chat') go('chat'); clearEmpty(); }
function scrollDown(){ const m=$('msgs'); m.scrollTop=m.scrollHeight; }
function maybeTimeDivider(){ const now=Date.now(); if(!lastMsgTime||(now-lastMsgTime)>3e5){ const d=new Date();
  const w=['周日','周一','周二','周三','周四','周五','周六'];
  const el=document.createElement('div'); el.className='time-div'; el.textContent=`${d.getMonth()+1}月${d.getDate()}日 ${w[d.getDay()]} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  $('msgs').appendChild(el);} lastMsgTime=now; }
function addUser(text, atts){
  ensureChat();
  const row=document.createElement('div'); row.className='row user';
  (atts||[]).forEach(name=>{ const a=document.createElement('div'); a.className='u-att'; a.innerHTML=IC.clip+escHtml(typeof name==='string'?name:(name.name||'')); row.appendChild(a); });
  if(text){ const b=document.createElement('div'); b.className='bubble-user'; b.textContent=text; row.appendChild(b); }
  $('msgs').appendChild(row); scrollDown(); return row;
}
function addAssistant(text){
  ensureChat();
  const row=document.createElement('div'); row.className='row assistant';
  const head=document.createElement('div'); head.className='a-head'; head.innerHTML=PANDO_LOGO(14)+`<span class="nm">${escHtml(ASST)}</span>`; row.appendChild(head);
  const t=document.createElement('div'); t.className='a-text'; t.textContent=text||''; t.dataset.role='text'; row.appendChild(t);
  $('msgs').appendChild(row); scrollDown(); return row;
}
function updateAssistant(row,text){ const t=row.querySelector('.a-text[data-role=text]'); if(t) t.textContent=text; scrollDown(); }
// thinking 收起态 pill + 点开就地展开(clay 左边框);工具行折叠进同一披露区
function addThinking(row, thinking, tools){
  thinking=thinking||''; tools=tools||[];
  if(!thinking && !tools.length) return;
  const head=row.querySelector('.a-head');
  const pill=document.createElement('button'); pill.className='think-pill';
  const durLabel = thinking ? `思考 ${(thinking.length/1000).toFixed(1)}k` : `工具 ${tools.length}`;
  pill.innerHTML=`<span class="lb">${durLabel}</span><span class="ca">▸</span>`;
  const body=document.createElement('div'); body.className='think-body'; body.style.display='none';
  if(thinking){ const tx=document.createElement('div'); tx.textContent=thinking; body.appendChild(tx); }
  tools.forEach(tl=>{ const ln=document.createElement('div'); ln.className='think-tool';
    const nm=escHtml(tl.tool||''); const pv=escHtml((tl.preview||'').replace(/\s+/g,' ').trim().slice(0,120));
    ln.innerHTML=`<b>${nm}</b>${pv?' · '+pv:''}`; body.appendChild(ln); });
  pill.onclick=()=>{ const open=body.style.display!=='none'; body.style.display=open?'none':'block'; pill.querySelector('.ca').textContent=open?'▸':'▾'; scrollDown(); };
  head.insertAdjacentElement('afterend', body);
  head.insertAdjacentElement('afterend', pill);
}
function addUsage(row,meta){
  const parts=[]; if(meta.duration_ms) parts.push((meta.duration_ms/1000).toFixed(1)+'s');
  if(meta.cost_usd) parts.push('$'+Number(meta.cost_usd).toFixed(4));
  const u=meta.usage||{}; if(u.input_tokens||u.output_tokens) parts.push(`↓${u.input_tokens||0} ↑${u.output_tokens||0}`);
  if(!parts.length) return; const el=document.createElement('div'); el.className='a-usage'; el.textContent=parts.join('  '); row.appendChild(el);
}
function addStopped(row){ const el=document.createElement('div'); el.className='a-usage'; el.textContent='已停止'; row.appendChild(el); }
function addToolbar(row,text){
  const bar=document.createElement('div'); bar.className='a-tools';
  const copy=document.createElement('button'); copy.className='a-tool'; copy.title='复制'; copy.innerHTML=IC.copy;
  copy.onclick=()=>{ navigator.clipboard&&navigator.clipboard.writeText(text); toast('已复制'); };
  const read=document.createElement('button'); read.className='a-tool'; read.title='朗读'; read.innerHTML=IC.read;
  read.onclick=()=>speak(text,read);
  bar.appendChild(copy); bar.appendChild(read); row.appendChild(bar);
}
function addSystem(text){ ensureChat(); const el=document.createElement('div'); el.className='msg-sys'; el.textContent=text; $('msgs').appendChild(el); scrollDown(); }

let speaking=null;
function speak(text,btn){ try{ if(speaking){ speechSynthesis.cancel(); speaking=null; return; } const u=new SpeechSynthesisUtterance(text); u.lang='zh-CN'; u.onend=()=>speaking=null; speaking=u; speechSynthesis.speak(u); }catch(e){} }

function showTyping(){ removeTyping(); ensureChat(); typingEl=document.createElement('div'); typingEl.className='typing';
  typingEl.innerHTML=`<span class="lb">正在思考,稍等</span><span class="d blink"></span>`; $('msgs').appendChild(typingEl); scrollDown(); }
function removeTyping(){ if(typingEl){ typingEl.remove(); typingEl=null; } }

/* ===== send ===== */
function onSendBtn(){ if(busy) stopStreaming(); else send(); }
function stopStreaming(){ if(ws&&ws.readyState===1) ws.send(JSON.stringify({type:'stop'})); }
function send(){
  const inp=$input;
  const text=(inp&&inp.value.trim())||'';
  if(busy||!ws||ws.readyState!==1) return;
  if(pendingAtts.some(a=>a.uploading)) return;
  const ready=pendingAtts.filter(a=>a.path);
  if(!text && !ready.length) return;
  if(inp){ inp.value=''; inp.style.height='auto'; }   // 先清发起处输入(HOME→CHAT 切换会重指 $input)
  maybeTimeDivider();
  addUser(text, ready.map(a=>a.name));
  currentAssistantRow=null; assistantText=''; roundTools=[];
  const payload={text, model:currentModel||undefined};
  if(ready.length) payload.attachments=ready.map(a=>a.path);
  ws.send(JSON.stringify(payload));
  clearAttachments(); setBusy(true); showTyping();
}

/* ===== WebSocket ===== */
function setStatus(on){ ['home','chat'].forEach(v=>{ const d=$(v+'-dot'), s=$(v+'-stat'); if(d) d.className='dot'+(on?'':' off'); if(s) s.textContent=on?'在线':'离线'; }); }
function setBusy(b){ busy=b; document.querySelectorAll('#send-btn').forEach(btn=>{ btn.className='send'+(b?' stop':''); btn.innerHTML=b?IC.stop:IC.send; }); }
function connect(){
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen=()=>{ setStatus(true); if(currentSessionId) ws.send(JSON.stringify({switch_session:currentSessionId})); };
  ws.onclose=()=>{ setStatus(false); setBusy(false); clearPendingPermissions(); setTimeout(connect,2000); };
  ws.onerror=()=>setStatus(false);
  ws.onmessage=ev=>{
    let m; try{ m=JSON.parse(ev.data); }catch{ return; }
    switch(m.type){
      case 'hello': break;
      case 'session': setSessionId(m.session_id); break;
      case 'memory_recall': break;
      case 'thinking': break;
      case 'tool_use': roundTools.push({tool:m.tool,preview:m.input_preview}); showTyping(); break;
      case 'text':
        removeTyping(); assistantText+=m.text;
        if(!currentAssistantRow) currentAssistantRow=addAssistant('');
        updateAssistant(currentAssistantRow, assistantText); break;
      case 'result':
        removeTyping();
        if(m.text && !assistantText){ currentAssistantRow=addAssistant(m.text); assistantText=m.text; }
        if(currentAssistantRow) addThinking(currentAssistantRow, m.thinking, roundTools);
        if(currentAssistantRow && assistantText) addToolbar(currentAssistantRow, assistantText);
        if(currentAssistantRow){ if(m.stopped) addStopped(currentAssistantRow); else if(m.usage) addUsage(currentAssistantRow,{cost_usd:m.cost_usd,duration_ms:m.duration_ms,usage:m.usage}); }
        if(m.session_id) setSessionId(m.session_id);
        currentAssistantRow=null; assistantText=''; roundTools=[]; setBusy(false); break;
      case 'error': removeTyping(); addSystem('⚠ '+(m.message||'error')+(m.detail?'\n'+m.detail:'')); setBusy(false); break;
      case 'permission_request': enqueuePermission(m); break;
    }
  };
}

/* ===== permission ===== */
const permQueue=[]; let permTimer=null, permCd=null; const PERM_TIMEOUT=120;
function enqueuePermission(req){ permQueue.push(req); if(permQueue.length===1) showNextPerm(); else updatePermBadge(); }
function showNextPerm(){ clearPermTimers(); const req=permQueue[0]; if(!req){ hidePerm(); return; }
  $('perm-tool').textContent=req.tool||'工具';
  let p; try{ p=JSON.stringify(req.input??{},null,2); }catch{ p=String(req.input); }
  if(p.length>1400) p=p.slice(0,1400)+'\n… (truncated)';
  $('perm-params').textContent=p; updatePermBadge();
  let left=PERM_TIMEOUT; $('perm-countdown').textContent=`· ${left}s`;
  permCd=setInterval(()=>{ left-=1; $('perm-countdown').textContent=`· ${Math.max(0,left)}s`; if(left<=0) clearInterval(permCd); },1000);
  permTimer=setTimeout(()=>respondPermission(false),PERM_TIMEOUT*1000);
  $('perm-ov').classList.add('open');
}
function updatePermBadge(){ const n=permQueue.length; $('perm-queue').textContent=n>1?`还有 ${n-1} 个待确认 · `:''; }
function respondPermission(allow){ const req=permQueue.shift(); if(req&&ws&&ws.readyState===1) ws.send(JSON.stringify({type:'permission_response',request_id:req.request_id,allow:!!allow})); clearPermTimers(); if(permQueue.length) showNextPerm(); else hidePerm(); }
function clearPendingPermissions(){ permQueue.length=0; clearPermTimers(); hidePerm(); }
function clearPermTimers(){ if(permTimer) clearTimeout(permTimer); if(permCd) clearInterval(permCd); permTimer=permCd=null; }
function hidePerm(){ $('perm-ov').classList.remove('open'); }

/* ===== toast ===== */
let toastTimer=null;
function toast(msg){ const el=$('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2200); }

/* ===== boot ===== */
async function boot(){
  $('hero-mark').innerHTML=PANDO_LOGO(25);
  $('side-logo').innerHTML=PANDO_LOGO(18);
  mountComposers();
  try{ const cfg=await (await fetch('/config')).json(); ASST=cfg.assistant_name||localStorage.getItem('assistantName')||'Claude'; }catch(e){ ASST=localStorage.getItem('assistantName')||'Claude'; }
  const nick=localStorage.getItem('userNickname');
  $('hero-name').textContent = nick? `${nick},你好` : '你好';
  $('hero-sub').textContent = new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit'});
  ['home-asst','chat-asst'].forEach(id=>$(id).textContent=ASST);
  try{ const h=await (await fetch('/health')).json(); if(h&&h.version) $('side-ver').textContent='Pando v'+h.version; }catch(e){}
  await loadSessions();
  connect();
}
boot();
