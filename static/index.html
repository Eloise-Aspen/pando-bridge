<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#faf9f5">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Pando</title>
<style>
  /* 自托管字体(CONSTRAINTS 禁 CDN):Inter=UI/数字,JetBrains Mono=代码;中文走系统栈 */
  @font-face{font-family:'Inter';font-style:normal;font-weight:400;font-display:swap;src:url('/fonts/inter-400.woff2') format('woff2')}
  @font-face{font-family:'Inter';font-style:normal;font-weight:500;font-display:swap;src:url('/fonts/inter-500.woff2') format('woff2')}
  @font-face{font-family:'Inter';font-style:normal;font-weight:600;font-display:swap;src:url('/fonts/inter-600.woff2') format('woff2')}
  @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:400;font-display:swap;src:url('/fonts/jetbrains-mono-400.woff2') format('woff2')}
  @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:500;font-display:swap;src:url('/fonts/jetbrains-mono-500.woff2') format('woff2')}

  :root{
    --ui:'Inter',-apple-system,BlinkMacSystemFont,'PingFang SC','MiSans','HarmonyOS Sans SC','Noto Sans CJK SC','Microsoft YaHei',system-ui,sans-serif;
    --code:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    /* 中性(源自 Pando 原型.dc.html) */
    --bg:#FAF9F5; --card:#fff; --surface:#F5F4ED; --track:#F0EEE6;
    --text:#141413; --ink:#1F1E1D; --text2:#3D3D3A; --dim:#73726C; --faint:#9C9A92; --fainter:#B0AEA4; --hint:#C2C0B6; --icon:#8B8A83;
    --line:rgba(31,30,29,.1); --line-soft:rgba(31,30,29,.06); --line-strong:rgba(31,30,29,.14);
    /* clay + 语义 */
    --accent:#D97757; --accent-press:#C6613F; --accent-bg:rgba(217,119,87,.1); --accent-bd:rgba(217,119,87,.22);
    --online:#5B9A5B; --warn:#D6A417; --danger:#B53333; --danger-text:#B15A32; --link:#2C84DB;
    --tag-proj:#2360A8; --tag-pref:#B15A32; --tag-life:#436426; --tag-read:#6B52A8;
    /* 卡片层级(Pando Kit「卡片层级」三阶):E0 查看信息(描边无阴影)/ E1 本页可交互(阴影无描边)/ E2 跳转(阴影更重+hover) */
    --e0-border:rgba(31,30,29,.07);
    --e1-shadow:0 1px 3px rgba(31,30,29,.05);
    --e2-shadow:0 4px 14px rgba(31,30,29,.06); --e2-shadow-hover:0 8px 22px rgba(31,30,29,.09);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--ui);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;
       display:flex;flex-direction:column;height:100dvh;overflow:hidden}
  a{color:var(--link);text-decoration:none}
  button{font-family:inherit}
  ::-webkit-scrollbar{width:0;height:0}
  .pd-scroll{-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .blink{animation:bk 1.05s steps(1) infinite}@keyframes bk{50%{opacity:0}}
  .spin{animation:sp .7s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){.blink,.spin{animation:none}}
  svg{display:block}

  /* ---- shell ---- */
  .app{flex:1;display:flex;flex-direction:column;min-height:0;position:relative;overflow:hidden;
       max-width:520px;width:100%;margin:0 auto}
  .view{flex:1;min-height:0;display:none;flex-direction:column}
  .view.active{display:flex}

  /* ---- top header (home/chat) ---- */
  .top{display:flex;align-items:center;gap:11px;padding:10px 18px 0;flex-shrink:0}
  .icon-btn{border:none;background:none;padding:6px;color:var(--icon);cursor:pointer;display:flex;flex-shrink:0}
  .icon-btn.lead{margin-left:-6px}
  .top-id{flex:1;min-width:0;display:flex;align-items:center;gap:7px}
  .top-id .nm{font:600 13.5px var(--ui);color:var(--text)}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--online);box-shadow:0 0 0 3px rgba(91,154,91,.16)}
  .dot.off{background:var(--danger);box-shadow:0 0 0 3px rgba(181,51,51,.14)}
  /* 顶栏「在线」标识(原型更新:名字后不再是裸 点+文字,改绿/红色调胶囊徽标) */
  .status-badge{display:inline-flex;align-items:center;gap:5px;border-radius:9999px;padding:3px 9px 3px 7px}
  .status-badge.on{background:rgba(91,154,91,.12)}
  .status-badge.off{background:rgba(181,51,51,.12)}
  .status-badge .bdot{width:5px;height:5px;border-radius:50%}
  .status-badge.on .bdot{background:var(--online)}
  .status-badge.off .bdot{background:var(--danger)}
  .status-badge .blabel{font:500 12px var(--ui)}
  .status-badge.on .blabel{color:#4A7F4A}
  .status-badge.off .blabel{color:var(--danger-text)}
  .divider{margin:12px 18px 0;height:1px;background:var(--line-soft);flex-shrink:0}

  /* ---- home ---- */
  .home-body{flex:1;min-height:0;overflow:auto;display:flex;flex-direction:column;justify-content:center}
  .hero{padding:26px 24px 14px;display:flex;flex-direction:column;align-items:center;flex-shrink:0}
  .hero-ring{width:66px;height:66px;border-radius:50%;border:1px solid var(--accent-bd);display:flex;align-items:center;justify-content:center;margin-bottom:16px;position:relative}
  .hero-ring::after{content:'';position:absolute;inset:-9px;border-radius:50%;border:1px solid rgba(217,119,87,.09)}
  .hero-mark{width:50px;height:50px;border-radius:50%;background:var(--accent-bg);border:1px solid var(--accent-bd);display:flex;align-items:center;justify-content:center}
  .hero-name{font:600 24px var(--ui);letter-spacing:.03em;color:var(--text);margin-bottom:6px}
  .hero-sub{font:400 12px var(--ui);color:var(--faint)}
  .recent{padding:26px 28px 0}
  .recent-h{font:600 10.5px var(--ui);letter-spacing:.1em;color:var(--hint);text-transform:uppercase;padding:0 0 2px}
  .recent-item{display:flex;align-items:baseline;gap:10px;padding:11px 0;border-bottom:1px solid rgba(31,30,29,.05);cursor:pointer}
  .recent-item .t{flex:1;font:400 14px var(--ui);color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .recent-item .w{font:400 11px var(--ui);color:var(--fainter);flex-shrink:0}

  /* ---- composer ---- */
  .composer{padding:12px 18px 16px;flex-shrink:0}
  .composer.home{border-top:none;padding-top:6px}
  .composer.chat{border-top:1px solid var(--line)}
  .attach-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:11px}
  .attach-row:empty{display:none}
  .attach-chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:5px 8px 5px 10px}
  .attach-chip .nm{font:400 12px var(--ui);color:var(--text2);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .attach-chip.uploading{opacity:.6}
  .attach-chip.error{border-color:var(--danger);color:var(--danger)}
  .chip-x{cursor:pointer;display:flex;color:var(--faint)}
  .chip-spin{width:12px;height:12px;border:2px solid var(--faint);border-top-color:transparent;border-radius:50%}
  .comp-line{display:flex;flex-direction:column;gap:10px}
  .comp-line.home{border-top:1px solid var(--line);padding-top:12px}
  .comp-ctrl{display:flex;align-items:center;gap:8px}
  .comp-ctrl .model-slot{margin-right:auto}
  #input{width:100%;border:none;outline:none;background:none;resize:none;font:400 15px/1.55 var(--ui);color:var(--ink);min-height:24px;max-height:160px;padding:2px 0}
  .model-slot{position:relative;flex-shrink:0}
  .model-btn{display:inline-flex;align-items:center;gap:3px;border:none;background:var(--card);box-shadow:var(--e1-shadow);border-radius:9999px;padding:5px 11px;font:500 12px var(--ui);color:var(--text2);cursor:pointer;white-space:nowrap}
  .model-pop{position:absolute;left:0;bottom:calc(100% + 6px);background:var(--card);border:1px solid var(--line-strong);border-radius:10px;padding:4px;min-width:150px;box-shadow:0 10px 30px rgba(31,30,29,.16);z-index:20}
  .model-opt{padding:9px 12px;border-radius:7px;font:400 13.5px var(--ui);color:var(--dim);cursor:pointer}
  .model-opt.sel{background:var(--accent-bg);color:var(--accent-press);font-weight:500}
  .model-opt.custom{border-top:1px solid var(--line-soft);margin-top:2px;color:var(--faint)}
  .send{width:38px;height:38px;flex-shrink:0;border-radius:50%;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .send.stop{background:var(--surface);color:var(--text2);border:1px solid var(--line-strong)}
  .send:disabled{background:var(--surface);color:var(--hint);cursor:default}

  /* ---- chat ---- */
  .msgs{flex:1;overflow:auto;padding:16px 20px 18px;display:flex;flex-direction:column;gap:20px;min-height:0}
  .time-div{align-self:center;font:400 11px var(--ui);color:var(--fainter)}
  .row{display:flex;flex-direction:column;gap:6px}
  .row.user{align-items:flex-end}
  .row.assistant{align-items:flex-start;gap:10px}
  .bubble-user{max-width:82%;background:var(--accent-bg);border-radius:16px 16px 4px 16px;padding:10px 14px;font:400 14.5px/1.6 var(--ui);color:var(--ink);white-space:pre-wrap;word-break:break-word}
  .u-att{display:inline-flex;align-items:center;gap:5px;background:var(--surface);border-radius:8px;padding:3px 8px;font:400 11px var(--ui);color:var(--icon)}
  .a-head{display:flex;align-items:center;gap:7px}
  .a-head .nm{font:600 11px var(--ui);letter-spacing:.06em;color:var(--icon);text-transform:uppercase}
  /* Chip(Pando Kit)——自带底色不描边 */
  /* 思考 chip(Pando 原型 CHAT 屏实况规格,非 Kit 通用图例):图标 + 大写字距标签 + 独立等宽 caret */
  .think-pill{align-self:flex-start;display:inline-flex;align-items:center;gap:5px;background:var(--surface);border:none;border-radius:9999px;padding:4px 10px;cursor:pointer;font:500 11px var(--ui);color:var(--icon)}
  .think-pill.tool-only{color:#B07A5E}
  .think-pill svg{flex-shrink:0}
  /* 桌面(≥880px)"原文处展开"态:不弹底部弹窗,直接在 chip 下方续写(边线样式沿用早期未启用的稿子) */
  .think-body{align-self:stretch;margin-top:8px;border-left:2px solid rgba(217,119,87,.3);padding:2px 0 2px 14px;font:400 14px/1.8 var(--ui);color:var(--dim);white-space:pre-wrap;word-break:break-word;max-height:320px;overflow:auto}
  .think-body .ti-meta{font:400 11.5px var(--ui);color:var(--fainter);margin-bottom:8px;font-variant-numeric:tabular-nums}
  .think-tool{font:400 12.5px/1.7 var(--ui);color:var(--dim);padding-top:8px;margin-top:8px;border-top:1px solid var(--line-soft)}
  .think-tool b{color:var(--accent-press);font-weight:600}
  .a-text{font:400 16.5px/1.9 var(--ui);color:var(--ink);white-space:pre-wrap;word-break:break-word}
  .a-usage{font:400 11px var(--ui);font-variant-numeric:tabular-nums;color:var(--fainter)}
  .a-footer{display:flex;align-items:center;gap:10px;margin-top:2px}
  .a-tools{display:flex;align-items:center;gap:2px}
  .a-tool{border:none;background:none;padding:7px;color:var(--faint);cursor:pointer;display:flex}
  .a-tool:active{color:var(--accent-press)}
  .typing{align-self:flex-start;display:flex;align-items:center;gap:7px}
  .typing .lb{font:400 14px var(--ui);color:var(--faint);font-style:italic}
  .typing .d{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px 0;color:var(--fainter)}
  .msg-sys{align-self:center;max-width:88%;font:400 13px/1.6 var(--ui);color:var(--danger-text);white-space:pre-wrap;text-align:center}

  /* ---- sidebar ---- */
  .overlay{position:absolute;inset:0;background:rgba(20,20,19,.32);z-index:90;opacity:0;pointer-events:none;transition:opacity .2s}
  .overlay.open{opacity:1;pointer-events:auto}
  .drawer{position:absolute;left:0;top:0;bottom:0;width:300px;max-width:86%;background:var(--bg);z-index:100;transform:translateX(-100%);
          transition:transform .24s ease;display:flex;flex-direction:column;border-right:1px solid var(--line)}
  .drawer.open{transform:none}
  .dh{display:flex;align-items:center;gap:10px;padding:16px;border-bottom:1px solid var(--line)}
  .dh .t{flex:1;font:600 16px var(--ui);color:var(--text)}
  .newchat{display:inline-flex;align-items:center;gap:6px;background:var(--accent-bg);color:var(--accent-press);border:none;border-radius:10px;padding:7px 12px;font:400 13px var(--ui);cursor:pointer}
  .dnav{padding:8px 8px 6px;display:flex;flex-direction:column;gap:2px;flex-shrink:0}
  .navitem{display:flex;align-items:center;gap:11px;border:none;background:none;text-align:left;padding:10px 12px;border-radius:9px;color:var(--text2);font:400 14px var(--ui);cursor:pointer}
  .navitem svg{opacity:.75;color:var(--icon)}
  .navitem:active{background:var(--surface)}
  .slist{flex:1;overflow:auto;padding:8px 8px 2px;min-height:0}
  .sgroup{font:600 10px var(--ui);letter-spacing:.08em;color:var(--fainter);text-transform:uppercase;padding:10px 12px 4px}
  .sitem{padding:9px 12px;border-radius:9px;cursor:pointer}
  .sitem.active,.sitem:active{background:var(--surface)}
  .sitem .t{font:400 14px var(--ui);color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sitem .m{font:400 12px var(--ui);color:var(--fainter);margin-top:2px}
  .dfoot{padding:12px 16px;border-top:1px solid var(--line);font:400 11px var(--ui);letter-spacing:.04em;color:var(--fainter);flex-shrink:0}

  /* ---- permission sheet ---- */
  .sheet-ov{position:absolute;inset:0;background:rgba(20,20,19,.4);z-index:130;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
  .sheet-ov.open{opacity:1;pointer-events:auto}
  /* 权限弹层与思考弹窗同构(Pando 原型统一规格):抓手 + 标题栏(下分隔线) + 内容区;
     圆角只上不下(flush bottom,避免真机实装时底部露出缝隙) */
  .sheet{width:100%;max-width:520px;background:var(--card);border-radius:20px 20px 0 0;box-shadow:0 -16px 48px rgba(31,30,29,.13);padding:0;transform:translateY(12px);transition:transform .2s}
  .sheet-ov.open .sheet{transform:none}
  .sheet-grab{display:flex;justify-content:center;padding:10px 0 3px}
  .sheet-grab .bar{width:36px;height:4px;border-radius:9999px;background:rgba(31,30,29,.14)}
  .sheet-hd{display:flex;align-items:center;border-bottom:1px solid rgba(31,30,29,.07)}
  .perm-hd{gap:12px;padding:8px 20px 14px}
  .perm-ic{width:40px;height:40px;border-radius:11px;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .perm-tt{font:600 15px var(--ui);color:var(--text)}
  .perm-sub{font:400 12.5px var(--ui);color:var(--faint);margin-top:2px}
  .perm-body{padding:16px 20px calc(22px + var(--safe-bottom))}
  .perm-params{background:var(--bg);border:1px solid rgba(31,30,29,.09);border-radius:12px;padding:12px 14px;font:400 12px/1.6 var(--code);color:var(--text2);white-space:pre-wrap;word-break:break-word;max-height:150px;overflow:auto}
  .perm-note{font:400 12px/1.55 var(--ui);color:var(--fainter);margin:12px 2px 18px}
  .perm-note b{color:var(--dim);font-weight:500}
  .perm-btns{display:flex;flex-direction:column;gap:9px}
  .btn-primary{width:100%;border:none;background:var(--accent-press);color:#fff;border-radius:12px;padding:13px;font:600 14.5px var(--ui);cursor:pointer}
  .perm-row2{display:flex;gap:9px}
  .btn-ghost{flex:1;border:1px solid var(--line-strong);background:var(--card);color:var(--text2);border-radius:12px;padding:12px;font:500 14px var(--ui);cursor:pointer}
  .btn-deny{flex:1;border:1px solid rgba(181,51,51,.28);background:var(--card);color:var(--danger-text);border-radius:12px;padding:12px;font:500 14px var(--ui);cursor:pointer}
  /* ---- thinking sheet(与权限弹层同构,共用 .sheet/.sheet-grab/.sheet-hd)---- */
  .think-sheet-hd{gap:9px;padding:8px 20px 12px}
  .think-sheet-hd .tt-wrap{flex:1}
  .think-sheet-hd .tt{font:600 15px var(--ui);color:var(--text)}
  .think-sheet-hd .meta{font:400 12px var(--ui);font-variant-numeric:tabular-nums;color:var(--fainter);margin-left:7px}
  .think-sheet-hd .icon-btn{padding:4px;color:var(--faint)}
  .think-sheet-body{padding:16px 20px calc(28px + var(--safe-bottom));max-height:50vh;overflow:auto;font:400 14.5px/1.85 var(--ui);color:var(--dim);white-space:pre-wrap;word-break:break-word;-webkit-overflow-scrolling:touch}
  .think-sheet-body .tool-ln{font:400 12.5px/1.7 var(--ui);color:var(--dim);padding:8px 0 0;border-top:1px solid var(--line-soft);margin-top:10px}
  .think-sheet-body .tool-ln b{color:var(--accent-press);font-weight:600}
  /* ---- 删除记忆二次确认(居中弹窗,非底部弹层——一次性判断,不需要抓手/拖拽语义) ---- */
  .confirm-ov{position:absolute;inset:0;background:rgba(20,20,19,.4);z-index:140;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
  .confirm-ov.open{opacity:1;pointer-events:auto}
  .confirm-card{width:280px;background:var(--card);border-radius:16px;padding:20px 20px 16px;box-shadow:0 20px 60px rgba(31,30,29,.18);transform:scale(.96);transition:transform .15s}
  .confirm-ov.open .confirm-card{transform:scale(1)}
  .confirm-tt{font:600 15px var(--ui);color:var(--text)}
  .confirm-sub{font:400 13px/1.6 var(--ui);color:var(--faint);margin-top:6px}
  .confirm-btns{display:flex;gap:8px;margin-top:18px}
  .confirm-btns button{flex:1;border-radius:10px;padding:10px;font:500 13.5px var(--ui);cursor:pointer}
  .btn-danger-fill{border:none;background:var(--danger);color:#fff}
  /* ---- context indicator (chat header) ---- */
  .ctx-slot{position:relative;flex-shrink:0}
  .ctx-btn{display:inline-flex;align-items:center;gap:6px;border:none;background:var(--card);border-radius:9999px;padding:3px 10px 3px 5px;cursor:pointer;box-shadow:0 1px 3px rgba(31,30,29,.06)}
  .ctx-lb{font:500 11.5px var(--ui);font-variant-numeric:tabular-nums;color:var(--dim);white-space:nowrap}
  .ctx-cap{color:var(--fainter)}
  .ctx-pop{position:absolute;right:0;top:calc(100% + 8px);background:var(--card);border-radius:14px;padding:14px 15px;box-shadow:0 14px 40px rgba(31,30,29,.1);width:236px;z-index:30;display:flex;flex-direction:column;gap:11px}
  .ctx-h{display:flex;align-items:baseline;justify-content:space-between;font:600 12.5px var(--ui);color:var(--text)}
  .ctx-h span:last-child{font:500 11.5px var(--ui);font-variant-numeric:tabular-nums;color:var(--dim)}
  .ctx-track{height:5px;border-radius:9999px;background:rgba(31,30,29,.1);overflow:hidden}
  .ctx-track>div{height:100%;border-radius:9999px;background:var(--online);width:0;transition:width .2s}
  .ctx-rows{display:flex;flex-direction:column;gap:6px}
  .ctx-r{display:flex;align-items:center;justify-content:space-between;font:400 11.5px var(--ui);color:var(--text2)}
  .ctx-r>span:last-child{font-variant-numeric:tabular-nums;color:var(--dim)}
  .ctx-sep{height:1px;background:rgba(31,30,29,.08)}
  .ctx-btns{display:flex;gap:8px}
  .ctx-b1{flex:1;border:none;background:var(--surface);color:var(--text2);border-radius:10px;padding:8px;font:500 12px var(--ui);cursor:pointer}
  .ctx-b2{flex:1;border:none;background:var(--accent);color:#fff;border-radius:10px;padding:8px;font:600 12px var(--ui);cursor:pointer}
  /* ---- conversations ---- */
  .conv-search{padding:14px 20px 10px;flex-shrink:0;position:relative}
  .conv-search svg{position:absolute;left:33px;top:calc(50% + 2px);transform:translateY(-50%);pointer-events:none}
  .conv-search input{width:100%;border:none;outline:none;background:var(--surface);border-radius:11px;padding:10px 13px 10px 38px;font:400 14px var(--ui);color:var(--ink)}
  /* 焦点态:去浏览器默认蓝框,统一 clay 环(与原型 v2 搜索框 style-focus 一致)——只用在搜索框/名字输入框 */
  .mem-search input:focus,.conv-search input:focus,.set-input:focus{outline:none;box-shadow:0 0 0 2px rgba(217,119,87,.4)}
  .conv-list{flex:1;overflow:auto;padding:4px 20px 16px;display:flex;flex-direction:column;gap:9px;min-height:0}
  .conv-card{display:flex;align-items:center;gap:10px;background:var(--card);box-shadow:var(--e2-shadow);border-radius:13px;padding:13px 15px;cursor:pointer;transition:box-shadow .15s,transform .15s}
  .conv-card:hover,.conv-card:active{box-shadow:var(--e2-shadow-hover);transform:translateY(-1px)}
  .conv-card .body{flex:1;min-width:0}
  .conv-card .tt{font:500 15px var(--ui);color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .conv-card .pv{font:400 13px var(--ui);color:var(--faint);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .conv-card .mt{font:400 11px var(--ui);color:var(--fainter);margin-top:7px}

  /* ---- toast ---- */
  /* 白底 toast(原型实况:非黑底) */
  .toast{position:absolute;left:50%;bottom:calc(96px + var(--safe-bottom));transform:translateX(-50%);background:var(--card);color:var(--text2);border:1px solid var(--e0-border);box-shadow:0 6px 18px rgba(31,30,29,.1);font:400 13px var(--ui);padding:10px 16px;border-radius:9999px;z-index:200;max-width:80%;white-space:nowrap;text-align:center;opacity:0;pointer-events:none;transition:opacity .2s}
  .toast.show{opacity:1}

  /* ---- subpage shared ---- */
  .ph-body{flex:1;display:flex;align-items:center;justify-content:center;color:var(--fainter);font:400 14px var(--ui);padding:40px}
  .sub-top{padding:14px 20px 0;flex-shrink:0}
  .sub-top .r{display:flex;align-items:center;gap:8px}
  .sub-h{font:600 21px var(--ui);color:var(--text)}
  .sub-meta{margin-left:auto;font:400 12.5px var(--ui);color:var(--faint);white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
  .sub-body{flex:1;overflow:auto;min-height:0}
  .sub-empty{text-align:center;color:var(--fainter);font:400 14px/1.9 var(--ui);padding:44px 24px}
  /* memory */
  .mem-search{padding:14px 20px 10px;flex-shrink:0}
  .mem-search .box{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line-strong);border-radius:11px;padding:10px 13px}
  .mem-search input{flex:1;border:none;outline:none;background:none;font:400 14px var(--ui);color:var(--ink)}
  .mem-tags{display:flex;gap:8px;padding:0 20px 4px;overflow-x:auto;flex-shrink:0}
  .tag-chip{flex-shrink:0;white-space:nowrap;border-radius:9999px;padding:6px 14px;font:400 12.5px var(--ui);cursor:pointer;background:var(--card);border:1px solid var(--line-strong);color:var(--text2)}
  .tag-chip.on{background:var(--accent-press);border-color:var(--accent-press);color:#fff;font-weight:500}
  .mem-list{padding:14px 20px 16px;display:flex;flex-direction:column;gap:11px}
  .mem-card{background:var(--card);border:1px solid var(--e0-border);border-radius:14px;padding:14px 15px}
  .mem-card .tx{font:400 15px/1.72 var(--ui);color:var(--ink)}
  .mem-card .ft{display:flex;align-items:center;gap:8px;margin-top:11px}
  .mem-tag{border-radius:6px;padding:2px 8px;font:500 11px var(--ui)}
  .mem-date{font:400 11px var(--ui);color:var(--fainter)}
  .mem-del{margin-left:auto;border:none;background:none;padding:2px;color:#D6D3C9;cursor:pointer;display:flex}
  /* status */
  .st-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;padding:18px 20px 0}
  .st-card{background:var(--card);border:1px solid var(--e0-border);border-radius:14px;padding:15px}
  .st-card.dim{opacity:.5}
  .st-card .lb{display:flex;align-items:center;gap:7px;font:500 12px var(--ui);color:var(--dim)}
  .st-card .vl{font:500 18px var(--ui);color:var(--text);margin-top:11px}
  .st-card .sb{font:400 11px var(--ui);color:var(--faint);margin-top:4px}
  .st-sec{font:600 11px var(--ui);letter-spacing:.07em;color:var(--fainter);text-transform:uppercase;margin:24px 22px 12px}
  .st-box{margin:0 20px;background:var(--card);border:1px solid var(--e0-border);border-radius:14px;padding:16px}
  .st-box.rows{padding:0;overflow:hidden}
  .quota+.quota{margin-top:18px}
  .quota .qh{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .quota .qh .k{font:400 13px var(--ui);color:var(--text2)}
  .quota .qh .p{font:500 13px var(--ui);color:var(--dim)}
  .qbar{height:6px;border-radius:3px;background:var(--track);overflow:hidden}
  .qbar>div{height:100%;border-radius:3px}
  .quota .rs{font:400 10.5px var(--ui);color:var(--faint);margin-top:6px}
  .tool-row{display:flex;align-items:center;gap:11px;padding:13px 15px;border-bottom:1px solid var(--line-soft)}
  .tool-row:last-child{border-bottom:none}
  .tool-row .nm{flex:1;font:400 14px var(--ui);color:var(--ink)}
  .pill-tag{font:500 11px var(--ui);border-radius:6px;padding:2px 8px}
  /* settings */
  .set-body{padding:12px 20px 24px}
  .set-field{margin-bottom:20px}
  .set-field .lb{font:400 12px var(--ui);color:var(--faint);margin-bottom:8px}
  .set-input{width:100%;background:var(--card);border:1px solid var(--line-strong);border-radius:10px;padding:11px 13px;font:400 15px var(--ui);color:var(--ink);outline:none}
  .set-sec{font:600 11px var(--ui);letter-spacing:.07em;color:var(--fainter);text-transform:uppercase;margin:0 2px 10px}
  .set-group{background:var(--card);box-shadow:var(--e1-shadow);border-radius:14px;position:relative;margin-bottom:22px}
  .set-row{display:flex;align-items:center;padding:13px 15px;border-bottom:1px solid var(--line-soft)}
  .set-row:last-child{border-bottom:none}
  .set-row .k{flex:1;font:400 14.5px var(--ui);color:var(--ink)}
  .set-row .v{font:400 13px var(--ui);color:var(--faint);margin-right:10px}
  .set-row.tap{cursor:pointer}
  .set-row .danger{color:var(--danger-text)}
  .tog{width:44px;height:26px;border-radius:9999px;background:#E4E1D8;border:none;position:relative;cursor:pointer;flex-shrink:0;transition:background .18s;padding:0}
  .tog::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .18s;box-shadow:0 1px 3px rgba(20,20,19,.2)}
  .tog.on{background:var(--accent)}
  .tog.on::after{transform:translateX(18px)}
  .set-menu{position:absolute;right:14px;background:var(--card);border:1px solid var(--line-strong);border-radius:10px;padding:4px;min-width:180px;box-shadow:0 10px 30px rgba(31,30,29,.16);z-index:20}
  .set-menu .mi{padding:9px 12px;border-radius:7px;font:400 13.5px var(--ui);color:var(--dim);cursor:pointer}
  .set-menu .mi.sel{background:var(--accent-bg);color:var(--accent-press);font-weight:500}
  .set-ver{font:400 11.5px var(--ui);color:var(--fainter);text-align:center;margin:22px 0 0}
  @media (prefers-reduced-motion:reduce){.tog,.tog::after{transition:none}}

  /* ---- 桌面响应式(≥880px):侧栏常驻 + 内容居中限宽,复用既有组件与配色,不重画界面 ---- */
  @media (min-width:880px){
    html,body{overflow:auto}
    .app{max-width:none;flex-direction:row}
    .overlay{display:none}
    .drawer{position:static;transform:none;width:280px;flex-shrink:0;height:auto;transition:none;order:-1}
    .view{min-width:0}
    .view.active>*{max-width:720px;width:100%;margin-left:auto;margin-right:auto}
    .top .icon-btn.lead{display:none}
    @media (hover:hover){
      .navitem:hover,.sitem:hover,.model-opt:hover,.set-menu .mi:hover{background:var(--surface)}
    }
    /* 权限弹层桌面态:不再是打断式的底部弹层,改成右下角悬浮通知——
       背景透明且 pointer-events:none(不挡身后操作),只有卡片本身可点 */
    #perm-ov{background:transparent;align-items:flex-end;justify-content:flex-end;padding:22px;pointer-events:none}
    #perm-ov .sheet{width:380px;max-width:380px;border-radius:16px;box-shadow:0 14px 40px rgba(31,30,29,.16);pointer-events:auto}
    #perm-ov .sheet-grab{display:none}
  }
</style>
</head>
<body>
<div class="app" id="app">

      <div class="top-id"><span class="nm" id="home-asst">Claude</span><span class="status-badge on" id="home-badge"><span class="bdot"></span><span class="blabel" id="home-stat">在线</span></span></div>

    <div class="home-body">
      <div class="hero">
        <div class="hero-ring"><div class="hero-mark" id="hero-mark"></div></div>
        <div class="hero-name" id="hero-name">你好</div>

  <!-- ============ CHAT ============ -->
  <div class="view" id="v-chat">
    <div class="top">
      <button class="icon-btn lead" onclick="openSidebar()" aria-label="菜单">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"></path></svg></button>
      <div class="top-id"><span class="nm" id="chat-asst">Claude</span><span class="status-badge on" id="chat-badge"><span class="bdot"></span><span class="blabel" id="chat-stat">在线</span></span></div>
      <span class="ctx-slot" id="ctx-slot" style="display:none">
        <button class="ctx-btn" onclick="toggleCtx(event)" aria-label="上下文用量">
          <svg width="17" height="17" viewBox="0 0 20 20"><circle id="ctx-ring-track" cx="10" cy="10" r="7" fill="none" stroke="rgba(31,30,29,.12)" stroke-width="2.6"></circle><circle id="ctx-arc" cx="10" cy="10" r="7" fill="none" stroke="var(--online)" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="0 44" transform="rotate(-90 10 10)"></circle></svg>
          <span class="ctx-lb" id="ctx-lb">—<span class="ctx-cap"> / 200k</span></span>
        </button>
        <div class="ctx-pop" id="ctx-pop" style="display:none">
          <div class="ctx-h"><span>上下文用量</span><span id="ctx-h-val">—</span></div>
          <div class="ctx-track"><div id="ctx-track-fill"></div></div>
          <div class="ctx-rows">
            <div class="ctx-r"><span>输入</span><span id="ctx-in">—</span></div>
            <div class="ctx-r"><span>输出</span><span id="ctx-out">—</span></div>
          </div>
          <div class="ctx-sep"></div>
          <div class="ctx-btns"><button class="ctx-b1" onclick="compactCtx()">压缩上下文</button><button class="ctx-b2" onclick="newChat()">开新对话</button></div>
        </div>
      </span>
    </div>
    <div class="divider"></div>
    <div class="msgs pd-scroll" id="msgs"></div>
    <div class="composer chat">
      <div class="attach-row" id="attach-chat"></div>
      <div class="comp-line" data-composer="chat"></div>
    </div>
  </div>

  <!-- ============ conversations / memory / status / settings (JS-rendered) ============ -->
  <div class="view" id="v-conversations"></div>
  <div class="view" id="v-memory"></div>
  <div class="view" id="v-status"></div>
  <div class="view" id="v-settings"></div>

  <!-- ============ SIDEBAR ============ -->
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
  <div class="drawer" id="drawer">
    <div class="dh">
      <span id="side-logo" style="flex-shrink:0;display:flex"></span>
      <span class="t">Pando</span>
      <button class="newchat" onclick="newChat()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"></path></svg>新对话</button>
    </div>
    <nav class="dnav">
      <button class="navitem" onclick="go('conversations')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-8.5 8.5 8.6 8.6 0 0 1-3.8-.9L3 21l1.9-5.7A8.4 8.4 0 0 1 4 11.5 8.4 8.4 0 0 1 12.5 3 8.4 8.4 0 0 1 21 11.5z"></path></svg>对话</button>
      <button class="navitem" onclick="go('memory')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3a4 4 0 0 0-3.5 6A4 4 0 0 0 7 16.5 4 4 0 0 0 12 20a4 4 0 0 0 5-3.5A4 4 0 0 0 18.5 9 4 4 0 0 0 15 3a3.5 3.5 0 0 0-6 0z"></path><path d="M9 3v17M15 3v17"></path></svg>记忆</button>
      <button class="navitem" onclick="go('status')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l3 8 4-16 3 8h4"></path></svg>状态</button>
      <button class="navitem" onclick="go('settings')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1"></path></svg>设置</button>
    </nav>
    <div class="slist pd-scroll" id="side-list"></div>
    <div class="dfoot" id="side-ver">Pando</div>
  </div>

  <!-- ============ PERMISSION SHEET(与思考弹窗同构)============ -->
  <div class="sheet-ov" id="perm-ov">

</div>

<script>
const $ = id => document.getElementById(id);
const escHtml = s => (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
// Pando 根/立交桥标记(clay),原型同款
const PANDO_LOGO = size => `<svg width="${size}" height="${size}" viewBox="0 0 92 91" fill="none"><line x1="75.89" y1="45.4" x2="15.89" y2="45.39" stroke="#D97757" stroke-width="8"></line><line y1="-3.5" x2="24" y2="-3.5" transform="matrix(-4.37114e-08 -1 -1 4.37114e-08 42 78)" stroke="#D97757" stroke-width="7"></line><path d="M44.9746 90.7773C42.9926 86.3882 41.8887 81.5175 41.8887 76.3887C41.8887 74.0134 42.1272 71.6937 42.5781 69.4512C49.3588 58.2688 58.7688 48.8588 69.9512 42.0781C72.1937 41.6272 74.5134 41.3887 76.8887 41.3887C82.0175 41.3887 86.8882 42.4926 91.2773 44.4746C69.1937 51.269 51.769 68.6937 44.9746 90.7773Z" fill="#D97757"></path><line y1="-3.5" x2="24" y2="-3.5" transform="matrix(4.37114e-08 1 1 -4.37114e-08 49.2773 12.7773)" stroke="#D97757" stroke-width="7"></line><path d="M46.3027 0C48.2847 4.38913 49.3887 9.25989 49.3887 14.3887C49.3887 16.764 49.1502 19.0837 48.6992 21.3262C41.9186 32.5086 32.5086 41.9186 21.3262 48.6992C19.0837 49.1502 16.764 49.3887 14.3887 49.3887C9.25989 49.3887 4.38913 48.2847 0 46.3027C22.0837 39.5084 39.5084 22.0837 46.3027 0Z" fill="#D97757"></path></svg>`;
const IC = {
  attach:'<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M20 11.5l-7.8 7.8a4 4 0 0 1-5.7-5.7l8-8a2.7 2.7 0 0 1 3.8 3.8l-8 8a1.3 1.3 0 0 1-1.9-1.9l7.2-7.2"></path></svg>',
  send:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V6M6 12l6-6 6 6"></path></svg>',
  stop:'<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"></rect></svg>',
  copy:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="9" y="9" width="11" height="11" rx="2"></rect><path d="M5 15V6a2 2 0 0 1 2-2h9"></path></svg>',
  read:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 L6 9 H3 v6 h3 l5 4 z"></path><path d="M16 9a4 4 0 0 1 0 6"></path><path d="M19 7a7 7 0 0 1 0 10"></path></svg>',
  x:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"></path></svg>',
  clip:'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M20 11.5l-7.8 7.8a4 4 0 0 1-5.7-5.7l8-8a2.7 2.7 0 0 1 3.8 3.8l-8 8a1.3 1.3 0 0 1-1.9-1.9l7.2-7.2"></path></svg>',
};

/* ===== state ===== */
let ws, busy=false, currentAssistantRow=null, assistantText='', roundTools=[];
let currentSessionId = localStorage.getItem('currentSessionId') || null;
// 无「默认」占位项(看不出具体哪个模型);composer 显示的就是设置页选的默认模型——
// 首次无持久化值时落到 Sonnet 5(与 Pando 原型初始态一致),并立即写回 localStorage
let currentModel = localStorage.getItem('defaultModel') || 'claude-sonnet-5';
if(!localStorage.getItem('defaultModel')) localStorage.setItem('defaultModel', currentModel);

/* ===== attachments ===== */
const ATT_ALLOWED_EXT=['png','jpg','jpeg','gif','webp','pdf','txt','md','csv','json','log','py','js','ts','html','css','sh'];
const ATT_MAX_BYTES=10*1024*1024;
let pendingAtts=[], attSeq=0;
const extOf = n => (n.split('.').pop()||'').toLowerCase();
function onFilesSelected(e){ const files=Array.from(e.target.files||[]); e.target.value=''; files.forEach(uploadAttachment); }
async function uploadAttachment(file){
  if(!ATT_ALLOWED_EXT.includes(extOf(file.name))){ toast(file.name+' 类型不支持'); return; }
  if(file.size>ATT_MAX_BYTES){ toast(file.name+' 超过 10MB'); return; }
  const att={id:++attSeq,name:file.name,path:null,uploading:true,error:false};
  pendingAtts.push(att); renderChips();
  try{
    const fd=new FormData(); fd.append('file',file);
    const r=await fetch('/attachments',{method:'POST',body:fd});
    if(!r.ok) throw new Error('http '+r.status);
    att.path=(await r.json()).path; att.uploading=false;
  }catch(err){ console.error('attach upload failed',err); att.uploading=false; att.error=true; toast(file.name+' 上传失败'); setTimeout(()=>removeAttachment(att.id),1800); }
  renderChips();
}
function removeAttachment(id){ pendingAtts=pendingAtts.filter(a=>a.id!==id); renderChips(); }
function clearAttachments(){ pendingAtts=[]; renderChips(); }
function renderChips(){
  [$('attach-home'),$('attach-chat')].forEach(box=>{
    box.innerHTML='';
    pendingAtts.forEach(a=>{
      const chip=document.createElement('div');
      chip.className='attach-chip'+(a.uploading?' uploading':'')+(a.error?' error':'');
      chip.innerHTML=(a.uploading?'<span class="chip-spin spin"></span>':IC.clip)+`<span class="nm">${escHtml(a.name)}</span>`;
      if(!a.uploading){ const x=document.createElement('span'); x.className='chip-x'; x.innerHTML=IC.x; x.onclick=()=>removeAttachment(a.id); chip.appendChild(x); }
      box.appendChild(chip);
    });
  });
}

/* ===== view routing ===== */
function go(v){
  view=v; closeSidebar();
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  $('v-'+v).classList.add('active');
  if(v==='home'||v==='chat') syncComposerRefs();
  if(v==='conversations') loadConversations();
  if(v==='memory') loadMemory();
  if(v==='status') loadStatus();
  if(v==='settings') loadSettings();
  // 插件导航项:每次进入时调 render(与 loadMemory 等子页同一时机语义)
  if(v.startsWith('plugin-')){ const it=_pandoNavItems.find(i=>'plugin-'+i.id===v);
    if(it&&it.render){ try{ it.render($('v-'+v)); }catch(e){ console.warn('[Pando] 插件页渲染失败:',it.id,e); } } }
}

/* ===== context indicator ===== */
const CTX_CAP_FALLBACK=200000;
function fmtTok(n){ n=n||0;
  if(n>=1000000) return (n/1000000).toFixed(n%1000000?1:0)+'M';  // 1M 窗口显示 1M,不是 1000K
  if(n>=1000) return (n/1000).toFixed(n>=100000?0:1)+'K';
  return String(n); }
// 三档水位色(Pando Kit「上下文用量」组件定值):常态绿 ≤75% → 琥珀 >75% → 红 >90%(非 clay)
function ctxState(pct){
  if(pct>90) return { ring:'#BE4B3B', track:'rgba(190,75,59,.18)', label:'#BE4B3B', cap:'rgba(190,75,59,.6)', bar:'#BE4B3B' };
  if(pct>75) return { ring:'#BE8A2D', track:'rgba(31,30,29,.12)', label:'var(--dim)', cap:'var(--fainter)', bar:'#BE8A2D' };
  return { ring:'#5B9A5B', track:'rgba(31,30,29,.12)', label:'var(--dim)', cap:'var(--fainter)', bar:'var(--online)' };
}
// c = 后端 result.context(最后一条 assistant 的 usage 快照)。弹窗只渲染 used/window/input/output
// 四项——缓存命中行已按 Kit 更新删掉(缓存已计入 used 总数,单列是重复信息)。
// used=输入+缓存读+缓存写+输出=此刻上下文装了多少;window=该模型真实上下文窗口(不再写死 200k)。
// 压缩后 used 回落是预期(上下文真变小了),不是 bug。
function updateCtx(c){
  if(!c) return;
  const used=c.used||0, cap=c.window||CTX_CAP_FALLBACK;
  const pct=Math.min(100, used/cap*100), circ=44, st=ctxState(pct);
  const arc=$('ctx-arc'); if(arc){ arc.setAttribute('stroke-dasharray',`${(pct/100*circ).toFixed(1)} ${circ}`); arc.setAttribute('stroke',st.ring); }
  const trk=$('ctx-ring-track'); if(trk) trk.setAttribute('stroke',st.track);
  const lb=$('ctx-lb'); lb.innerHTML=`${fmtTok(used)}<span class="ctx-cap" style="color:${st.cap}"> / ${fmtTok(cap)}</span>`; lb.style.color=st.label;
  $('ctx-h-val').textContent=`${fmtTok(used)} / ${fmtTok(cap)}`;
  const f=$('ctx-track-fill'); f.style.width=pct+'%'; f.style.background=st.bar;
  $('ctx-in').textContent=fmtTok(c.input||0); $('ctx-out').textContent=fmtTok(c.output||0);
  $('ctx-slot').style.display='inline';
}
function toggleCtx(e){ e.stopPropagation(); const p=$('ctx-pop'); p.style.display=p.style.display==='none'?'flex':'none'; }
function compactCtx(){ $('ctx-pop').style.display='none'; toast('上下文压缩:接入后可用'); }
function hideCtx(){ const s=$('ctx-slot'); if(s) s.style.display='none'; const p=$('ctx-pop'); if(p) p.style.display='none'; }
// 侧边栏导航进来的子页(对话/记忆/状态/设置)左上是「打开侧边栏」汉堡键,不是返回——对齐原型

/* ===== MEMORY ===== */
let memActiveTag='全部', memStatsCache=null;
async function loadMemory(){
  const v=$('v-memory');
  // 插件记忆装饰器(registerMemoryDecorator)可提供标签筛选;有标签时渲染 chip 行
  const decoTags=_pandoMemDecorators.flatMap(d=>d.tags||[]);
  // 标签行 = 「全部」+ 插件标签(插件可自带「全部」定义其查询参数,去重保插件版)
  const tagLabels=['全部',...decoTags.map(t=>t.label)].filter((lb,i,arr)=>arr.indexOf(lb)===i);
  const tagsHtml=decoTags.length?`<div class="mem-tags pd-scroll" id="mem-tags">`+
    tagLabels.map(lb=>`<div class="tag-chip${lb===memActiveTag?' on':''}" onclick="setMemTag('${lb}')">${lb}</div>`).join('')+`</div>`:'';
  v.innerHTML=`<div class="sub-top"><div class="r"><button class="icon-btn lead" onclick="openSidebar()" aria-label="菜单">${MENU}</button><span class="sub-h">记忆</span><span class="sub-meta" id="mem-count"></span></div></div>
    <div class="mem-search"><div class="box">${SEARCHIC}<input id="mem-q" placeholder="搜索记忆…" oninput="renderMemories()" autocomplete="off"></div></div>
    ${tagsHtml}
    <div id="mem-plugin-header"></div>
    <div class="sub-body pd-scroll"><div class="mem-list" id="mem-list"></div></div>`;
  // 插件 header 槽(列表上方自定义内容;渲染失败只警告不影响列表)
  _pandoMemDecorators.forEach(d=>{ if(d.header){ try{ d.header($('mem-plugin-header')); }catch(e){ console.warn('[Pando] 记忆页 header 装饰失败:',d.id,e); } } });
  try{ const r=await fetch('/memory-admin/memory/stats'); if(r.ok){ memStatsCache=await r.json();
    $('mem-count').textContent=`${memStatsCache.count??0} 条 · ${fmtChars(memStatsCache.total_chars??memStatsCache.chars)}`; } }catch(e){}
  renderMemories();
}
function fmtChars(n){ if(!n) return '0 字'; return n>=1000?`${(n/1000).toFixed(1)}k 字`:`${n} 字`; }
function fmtReset(iso){ if(!iso) return ''; const d=new Date(iso), now=new Date();
  const hh=String(d.getHours()).padStart(2,'0'), mm=String(d.getMinutes()).padStart(2,'0');
  return d.toDateString()===now.toDateString()?`${hh}:${mm} 重置`:`${d.getMonth()+1}月${d.getDate()}日 ${hh}:${mm} 重置`; }
function setMemTag(t){ memActiveTag=t; document.querySelectorAll('#mem-tags .tag-chip').forEach(c=>c.classList.toggle('on',c.textContent===t)); renderMemories(); }
async function renderMemories(){
  const list=$('mem-list'); if(!list) return;
  const q=($('mem-q')?.value||'').trim();
  let items=null;
  // 标签筛选:装饰器标签可携带 query 参数(如 klass=xxx),仅无搜索词时生效
  const tagDef=_pandoMemDecorators.flatMap(d=>d.tags||[]).find(t=>t.label===memActiveTag);
  const listUrl='/memory-admin/memory/list'+(tagDef&&tagDef.query?`?${tagDef.query}`:'');
  try{ const url=q?`/memory-admin/memory/search?q=${encodeURIComponent(q)}`:listUrl;
    const r=await fetch(url); if(r.ok) items=await r.json(); else if(r.status===404) items='unconfigured'; }catch(e){ items='unconfigured'; }
  if(items==='unconfigured'){ list.innerHTML=`<div class="sub-empty">未配置记忆服务<br><span style="font-size:12px;color:var(--hint)">在宿主机指向 MEMORY_SERVICE_URL 后即可在此浏览记忆</span></div>`; return; }
  // 管理面契约(memory_stub 软约定)是 {items,total};容忍历史裸数组形状
  items=Array.isArray(items)?items:(items&&Array.isArray(items.items)?items.items:[]);
  if(!items.length){ list.innerHTML=`<div class="sub-empty">${q?'没有匹配的记忆':'还没有记忆'}</div>`; return; }
  // 开源服记忆无打标 → 只显示正文 + 时间;标签/卡片装饰由插件 registerMemoryDecorator 提供
  list.innerHTML=items.map(m=>{
    const text=escHtml(m.text||m.content||m.body||''); const date=fmtWhen(m.created_at||m.updated_at||m.origin_date||m.date);
    return `<div class="mem-card"><div class="tx">${text}</div><div class="ft"><span class="mem-date">${date}</span><button class="mem-del" onclick="deleteMemory('${m.id}')">${TRASH}</button></div></div>`;
  }).join('');
  // 卡片装饰钩子:插件可在每张卡上补标签等(装饰失败只警告,不影响列表)
  [...list.children].forEach((el,i)=>{ _pandoMemDecorators.forEach(d=>{ if(d.card){ try{ d.card(el,items[i]); }catch(e){ console.warn('[Pando] 记忆卡片装饰失败:',d.id,e); } } }); });
}
let pendingDeleteId=null;
function deleteMemory(id){ pendingDeleteId=id; $('confirm-ov').classList.add('open'); }

async function confirmDeleteMemory(){

  try{ const r=await fetch(`/memory-admin/memory/${id}`,{method:'DELETE'}); if(r.ok){ toast('已删除记忆'); loadMemory(); } }catch(e){}
}

  try{ const r=await fetch('/usage/quota'); if(r.ok) quota=await r.json(); }catch(e){}

function addUsage(row,meta){
  const parts=[]; if(meta.duration_ms) parts.push((meta.duration_ms/1000).toFixed(1)+'s');
  if(meta.cost_usd) parts.push('$'+Number(meta.cost_usd).toFixed(4));
  const u=meta.usage||{}; if(u.input_tokens||u.output_tokens) parts.push(`↓${u.input_tokens||0} ↑${u.output_tokens||0}`);
  if(!parts.length) return; const el=document.createElement('div'); el.className='a-usage'; el.textContent=parts.join('  '); row.appendChild(el);

function addStopped(row){ const el=document.createElement('div'); el.className='a-usage'; el.textContent='已停止'; row.appendChild(el); }
// 回复结尾数字:仅成本 + 缓存命中率(原型实况;时长/token 计数留给上下文用量,不在此重复),
// 中间用 middot 分隔(此前用两个空格拼接,视觉挤成一团——用户实测反馈)
function usageParts(meta){
  if(!meta) return '';
  const parts=[]; if(meta.cost_usd) parts.push('$'+Number(meta.cost_usd).toFixed(4));
  const u=meta.usage||{};
  const cacheRead=u.cache_read_input_tokens??u.cache_read??0, cacheCreate=u.cache_creation_input_tokens??u.cache_create??0;
  const used=(u.input_tokens||0)+cacheRead+cacheCreate;
  const cachePct = (u.cache_hit_pct!=null) ? Math.round(u.cache_hit_pct) : (used?Math.round(cacheRead/used*100):null);
  if(cachePct!=null) parts.push(`缓存 ${cachePct}%`);
  return parts.join(' · ');
}

function send(){

/* ===== WebSocket ===== */
function setStatus(on){ _lastOnline=!!on; ['home','chat'].forEach(v=>{ const b=$(v+'-badge'), s=$(v+'-stat'); if(b) b.className='status-badge '+(on?'on':'off'); if(s) s.textContent=on?'在线':'离线'; }); applyTopbarBadges(); _pandoEmit('ws_status',{online:!!on}); }
function setBusy(b){ busy=b; document.querySelectorAll('#send-btn').forEach(btn=>{ btn.className='send'+(b?' stop':''); btn.innerHTML=b?IC.stop:IC.send; }); }
function connect(){
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen=()=>{ setStatus(true); if(currentSessionId) ws.send(JSON.stringify({switch_session:currentSessionId})); };
  ws.onclose=()=>{ setStatus(false); setBusy(false); clearPendingPermissions(); setTimeout(connect,2000); };
  ws.onerror=()=>setStatus(false);
  ws.onmessage=ev=>{
    let m; try{ m=JSON.parse(ev.data); }catch{ return; }
    switch(m.type){
      case 'hello': break;
      case 'session': setSessionId(m.session_id); break;
      case 'memory_recall': break;
      case 'thinking': break;
      case 'tool_use': roundTools.push({tool:m.tool,preview:m.input_preview}); showTyping(); break;
      case 'text':
        removeTyping(); assistantText+=m.text;
        if(!currentAssistantRow) currentAssistantRow=addAssistant('');
        updateAssistant(currentAssistantRow, assistantText); break;
      case 'result':
        removeTyping();
        if(m.text && !assistantText){ currentAssistantRow=addAssistant(m.text); assistantText=m.text; }
        if(currentAssistantRow) addThinking(currentAssistantRow, m.thinking, roundTools, m.duration_ms);
        if(currentAssistantRow && assistantText) addToolbar(currentAssistantRow, assistantText, m.stopped?null:{cost_usd:m.cost_usd,duration_ms:m.duration_ms,usage:m.usage});
        if(currentAssistantRow && m.stopped) addStopped(currentAssistantRow);
        if(m.context) updateCtx(m.context);
        if(m.session_id) setSessionId(m.session_id);
        _pandoEmit('message_result',m);
        currentAssistantRow=null; assistantText=''; roundTools=[]; setBusy(false); break;
      case 'error': removeTyping(); addSystem('⚠ '+(m.message||'error')+(m.detail?'\n'+m.detail:'')); setBusy(false); break;
      case 'permission_request': enqueuePermission(m); break;
      default:
        // 未知消息类型交给插件注册的渲染器(registerMessageRenderer);没人认领则忽略
        if(_pandoMsgRenderers[m.type]){ try{ _pandoMsgRenderers[m.type](m); }catch(e){ console.warn('[Pando] 插件消息渲染失败:',m.type,e); } }
    }
  };
}

/* ===== permission ===== */
const permQueue=[]; let permTimer=null, permCd=null; const PERM_TIMEOUT=120;
function enqueuePermission(req){ permQueue.push(req); if(permQueue.length===1) showNextPerm(); else updatePermBadge(); }
function showNextPerm(){ clearPermTimers(); const req=permQueue[0]; if(!req){ hidePerm(); return; }
  $('perm-tool').textContent=req.tool||'工具';
  let p; try{ p=JSON.stringify(req.input??{},null,2); }catch{ p=String(req.input); }
  if(p.length>1400) p=p.slice(0,1400)+'\n… (truncated)';
  $('perm-params').textContent=p; updatePermBadge();
  let left=PERM_TIMEOUT; $('perm-countdown').textContent=`· ${left}s`;
  permCd=setInterval(()=>{ left-=1; $('perm-countdown').textContent=`· ${Math.max(0,left)}s`; if(left<=0) clearInterval(permCd); },1000);
  permTimer=setTimeout(()=>respondPermission(false),PERM_TIMEOUT*1000);
  $('perm-ov').classList.add('open');
}
function updatePermBadge(){ const n=permQueue.length; $('perm-queue').textContent=n>1?`还有 ${n-1} 个待确认 · `:''; }
function respondPermission(allow){ const req=permQueue.shift(); if(req&&ws&&ws.readyState===1) ws.send(JSON.stringify({type:'permission_response',request_id:req.request_id,allow:!!allow})); clearPermTimers(); if(permQueue.length) showNextPerm(); else hidePerm(); }
function clearPendingPermissions(){ permQueue.length=0; clearPermTimers(); hidePerm(); }
function clearPermTimers(){ if(permTimer) clearTimeout(permTimer); if(permCd) clearInterval(permCd); permTimer=permCd=null; }
function hidePerm(){ $('perm-ov').classList.remove('open'); }

/* ===== 插件挂点 window.Pando(apiVersion 1)===== */
// 基座暴露给外部插件包的最小挂点集(spec feat-frontend-plugin-arch 裁决 1):
// registerNavItem(侧边栏导航插槽)/ registerSettingsSection(设置分区)/
// registerMessageRenderer(自定义 WS 消息类型)/ on·emit(事件总线)。
// 事件名约定:session_switch(会话切换)、message_result(一轮回复完成)、
// theme_change(主题切换)、ws_status(连接状态)、send_payload(发送前,监听者可就地改 payload)。
// 扩集(spec 补裁决 2026-07-10):registerComposerAction(composer 按钮)、
// registerMessageAction(回复工具条动作,同 id 覆盖内置)、registerTopbarBadge(顶栏徽标装饰)、
// registerMemoryDecorator(记忆页标签筛选/卡片装饰)。此外不再加。
const _pandoEvents={}, _pandoMsgRenderers={}, _pandoSettingsSections=[], _pandoNavItems=[];
const _pandoComposerActions=[], _pandoMsgActions=[], _pandoTopbarBadges=[], _pandoMemDecorators=[];
function _pandoEmit(ev,data){ (_pandoEvents[ev]||[]).forEach(fn=>{ try{ fn(data); }catch(e){ console.warn('[Pando] 插件事件回调出错:',ev,e); } }); }
window.Pando={
  apiVersion:1,
  on(ev,fn){ (_pandoEvents[ev]=_pandoEvents[ev]||[]).push(fn); },
  emit:(ev,data)=>_pandoEmit(ev,data),
  registerMessageRenderer(type,fn){ _pandoMsgRenderers[type]=fn; },
  registerSettingsSection(sec){ if(sec&&sec.id) _pandoSettingsSections.push(sec); },
  registerNavItem(slot,item){
    // 基座当前只有侧边栏一个导航插槽;未知插槽记警告不抛错(加载降级规范)
    if(slot!=='sidebar'||!item||!item.id){ console.warn('[Pando] registerNavItem: 未知插槽或缺 id:',slot,item); return; }
    _pandoNavItems.push(item);
    const pv=document.createElement('div'); pv.className='view'; pv.id='v-plugin-'+item.id;
    $('app').insertBefore(pv,$('overlay'));
    const btn=document.createElement('button'); btn.className='navitem';
    btn.innerHTML=(item.icon||'')+escHtml(item.label||item.id);
    btn.onclick=()=>go('plugin-'+item.id);
    document.querySelector('.dnav').appendChild(btn);
  },
  registerComposerAction(item){
    // composer 按钮(如语音模式触发)。注册后重挂 composer 让按钮立即出现
    if(!item||!item.id||typeof item.onClick!=='function'){ console.warn('[Pando] registerComposerAction: 缺 id/onClick:',item); return; }
    _pandoComposerActions.push(item); mountComposers();
  },
  registerMessageAction(action){
    // 每条回复工具条上的动作;与内置动作(copy/read)同 id 时覆盖内置(如换成服务端 TTS)
    if(!action||!action.id||typeof action.onClick!=='function'){ console.warn('[Pando] registerMessageAction: 缺 id/onClick:',action); return; }
    _pandoMsgActions.push(action);
  },
  registerTopbarBadge(fn){
    // 顶栏状态徽标装饰:fn(badgeEl,{online})——每次连接状态刷新时对 home/chat 两枚徽标各调一次
    if(typeof fn!=='function') return;
    _pandoTopbarBadges.push(fn); applyTopbarBadges();
  },
  registerMemoryDecorator(dec){
    // 记忆页装饰:{id, tags:[{label,query}], card(el,item)}——标签筛选走 list 查询参数
    if(!dec||!dec.id){ console.warn('[Pando] registerMemoryDecorator: 缺 id:',dec); return; }
    _pandoMemDecorators.push(dec);
  },
};
// 顶栏徽标装饰统一入口(setStatus 与注册时各调一次;装饰失败只警告)
let _lastOnline=false;
function applyTopbarBadges(){
  ['home','chat'].forEach(v=>{ const b=$(v+'-badge'); if(!b) return;
    _pandoTopbarBadges.forEach(fn=>{ try{ fn(b,{online:_lastOnline}); }catch(e){ console.warn('[Pando] 顶栏徽标装饰失败:',e); } }); });
}
// 渲染设置页里插件注册的分区(loadSettings 每次重建 DOM 后调用)
function renderPluginSettings(body){
  const anchor=body.querySelector('.set-ver');
  _pandoSettingsSections.forEach(sec=>{ try{
    const h=document.createElement('div'); h.className='set-sec'; h.textContent=sec.title||sec.id;
    const g=document.createElement('div'); g.className='set-group';
    body.insertBefore(h,anchor); body.insertBefore(g,anchor);
    if(sec.render) sec.render(g);
  }catch(e){ console.warn('[Pando] 设置分区渲染失败:',sec.id,e); } });
}
// manifest 加载器:GET /api/plugins → [{id,src}] 按序注入 <script>;
// 单个插件加载失败只记 console 警告并继续,基座不白屏(外部依赖无降级规范)
async function loadFrontendPlugins(){
  let list=[];
  try{ const r=await fetch('/api/plugins'); if(r.ok) list=await r.json(); }
  catch(e){ console.warn('[Pando] 插件 manifest 获取失败:',e); }
  if(!Array.isArray(list)) list=[];
  for(const p of list){
    if(!p||!p.src) continue;
    await new Promise(done=>{
      const s=document.createElement('script'); s.src=p.src;
      s.onload=done;
      s.onerror=()=>{ console.warn('[Pando] 插件加载失败,已跳过:',p.id||p.src); done(); };
      document.head.appendChild(s);
    });
  }
}

/* ===== toast ===== */
let toastTimer=null;
function toast(msg){ const el=$('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2200); }

/* ===== boot ===== */
async function boot(){
  $('hero-mark').innerHTML=PANDO_LOGO(25);
  $('side-logo').innerHTML=PANDO_LOGO(18);
  mountComposers();
  try{ const cfg=await (await fetch('/config')).json(); ASST=cfg.assistant_name||localStorage.getItem('assistantName')||'Claude'; }catch(e){ ASST=localStorage.getItem('assistantName')||'Claude'; }
  const nick=localStorage.getItem('userNickname');
  $('hero-name').textContent = nick? `${nick},你好` : '你好';
  $('hero-sub').textContent = new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit'});
  ['home-asst','chat-asst'].forEach(id=>$(id).textContent=ASST);
  try{ const h=await (await fetch('/health')).json(); if(h&&h.version) $('side-ver').textContent='Pando v'+h.version; }catch(e){}
  await loadSessions();
  await loadFrontendPlugins();   // 先装插件再连 WS,保证消息渲染器/事件监听先注册好
  // PWA service worker:注册 + 把 sw 的通用转发消息(push_click)接到插件事件总线
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
    navigator.serviceWorker.addEventListener('message',e=>{ if(e.data&&e.data.type==='push_click') _pandoEmit('push_click',e.data.data||{}); });
  }
  // 冷启动经通知点击打开:?push=<json> 参数 → 同一事件口转发给插件后清掉参数
  try{ const pp=new URLSearchParams(location.search).get('push');
    if(pp){ _pandoEmit('push_click',JSON.parse(pp)); history.replaceState({},'',location.pathname); } }catch(e){}
  connect();
}
boot();
